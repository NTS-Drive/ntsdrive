<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>오늘도 무사퇴근 | Fortune</title>
<link rel="icon" type="image/svg+xml" href="/favicon.svg">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans+KR:wght@400;600;700&family=IBM+Plex+Mono:wght@400;600&display=swap" rel="stylesheet">
<link href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.css" rel="stylesheet">
<link rel="stylesheet" href="style.css">
<script src="https://html2canvas.hertzen.com/dist/html2canvas.min.js"></script>
</head>
<body id="capture-area">

<div class="app-bar">
  <a class="back-link" href="../index.html">&larr; Fortune으로 돌아가기</a>
  <div class="app-title">오늘도 무사퇴근</div>
  <button class="action-btn" onclick="openGuide()">가이드</button>
</div>

<div class="stage" id="stage">
  <!-- JS가 시간대에 따라 내용을 채웁니다 -->
</div>

<div class="overlay" id="guide-overlay" style="display:none;">
  <div class="modal">
    <h2>오늘도 무사퇴근, 이렇게 즐겨요</h2>
    <p>지금 시각에 맞는 포춘쿠키가 자동으로 열려요 — 출근길, 오전, 점심, 오후, 퇴근, 귀가 후까지 총 6개 시간대예요.</p>
    <p>직업을 선택하면 그 직업만의 코멘트가 하나 더 붙어요.</p>
    <p>각 시간대는 하루에 한 번만 열어볼 수 있어요. 다시 열려고 하면 유머러스한 안내 문구가 대신 나와요.</p>
    <p>결과는 링크 공유나 이미지 저장으로 남길 수 있어요.</p>
    <div class="modal-actions">
      <button class="action-btn primary" onclick="closeGuide()">확인</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script src="script.js"></script>
</body>
</html>
