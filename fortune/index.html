<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Fortune</title>
<link rel="icon" type="image/svg+xml" href="/favicon.svg">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans+KR:wght@400;600;700&family=IBM+Plex+Mono:wght@400;600&display=swap" rel="stylesheet">
<link href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.css" rel="stylesheet">
<link rel="stylesheet" href="../styles.css">
<script src="../analytics.js"></script>
<script src="../feedback-widget.js" defer></script>
</head>
<body>

<div class="explorer">

  <div class="addressbar">
    <div class="breadcrumb">
      <a class="crumb" href="../index.html">🗂️ NTS_Drive</a>
      <span class="sep">›</span>
      <span class="crumb current">🔮 Fortune</span>
    </div>
    <div class="search-wrap">
      <input id="searchInput" type="text" placeholder="Search Fortune">
    </div>
  </div>

  <div class="toolbar">
    <button class="tool-btn" id="refreshBtn" title="Refresh">
      <svg viewBox="0 0 20 20" width="15" height="15"><path d="M15 5a6 6 0 1 0 1.6 5.4M16 3v4h-4" stroke="currentColor" stroke-width="1.6" fill="none" stroke-linecap="round" stroke-linejoin="round"/></svg>
      Refresh
    </button>
    <div class="toolbar-spacer"></div>
  </div>

  <div class="explorer-body">
    <aside class="sidebar">
      <div class="side-section">
        <div class="side-title">Quick access</div>
        <button class="side-item active" data-filter="all">All items</button>
      </div>
      <div class="side-section ad-side">
        <div class="side-title">Ad space</div>
        <div class="ad-slot-vert">160×300<br>Reserved for AdSense</div>
      </div>
    </aside>

    <main class="listpane">
      <div class="list-head cols-root">
        <div class="col col-name">Name</div>
        <div class="col col-type">Type</div>
        <div class="col col-status">Status</div>
        <div class="col col-action">Open</div>
      </div>
      <div id="fileList" class="file-list cols-root"></div>
      <div id="emptyState" class="empty-state" hidden>No content yet.</div>
    </main>
  </div>

  <div class="statusbar">
    <span id="statusCount">0 items</span>
    <span class="statusbar-note">For entertainment purposes only — not professional advice, and not affiliated with any official lottery operator.</span>
  </div>
</div>

<script>
let ITEMS = [];

function render(list) {
  const listEl = document.getElementById('fileList');
  const emptyEl = document.getElementById('emptyState');
  listEl.innerHTML = '';
  emptyEl.hidden = list.length > 0;

  list.forEach(item => {
    const row = document.createElement('div');
    row.className = 'file-row cols-root';
    const btnHtml = item.entryPath
      ? `<a class="play-btn" href="${item.entryPath}">Open</a>`
      : `<span class="play-btn disabled">Soon</span>`;
    row.innerHTML = `
      <div class="col col-name">
        <span class="file-icon">${item.emoji || '🔮'}</span>
        <div>
          <div class="file-title">${item.title}</div>
          <div class="file-desc">${item.description || ''}</div>
        </div>
      </div>
      <div class="col col-type">${item.type || ''}</div>
      <div class="col col-status"><span class="dot ${item.status === 'Live' ? 'live' : 'planning'}"></span>${item.status}</div>
      <div class="col col-action">${btnHtml}</div>
    `;
    listEl.appendChild(row);
  });
}

async function init() {
  try {
    const res = await fetch('items.json', { cache: 'no-store' });
    ITEMS = await res.json();
    render(ITEMS);
    document.getElementById('statusCount').textContent = `${ITEMS.length} items`;
  } catch (e) {
    document.getElementById('statusCount').textContent = 'Could not load items.json';
  }
}

document.getElementById('searchInput').addEventListener('input', (e) => {
  const q = e.target.value.trim().toLowerCase();
  render(ITEMS.filter(i => i.title.toLowerCase().includes(q) || (i.description || '').toLowerCase().includes(q)));
});

document.getElementById('refreshBtn').addEventListener('click', init);

init();
</script>

</body>
</html>
