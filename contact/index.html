<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<meta name="theme-color" content="#17140F">
<title>문의하기 | NTS Drive</title>
<link rel="icon" type="image/svg+xml" href="../favicon.svg">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;600;700&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="../styles.css?v=1784358482">
<script src="../analytics.js"></script>
<style>
  .contact-form{max-width:480px;}
  .contact-field{margin-bottom:20px;}
  .contact-field label{display:block; font-size:12.5px; font-weight:600; color:var(--ink); margin-bottom:8px;}
  .contact-field input, .contact-field textarea{
    width:100%; border:1px solid var(--line); border-radius:8px; padding:12px 14px;
    font-family:'Inter',sans-serif; font-size:14px; color:var(--ink); outline:none; box-sizing:border-box;
  }
  .contact-field input:focus, .contact-field textarea:focus{border-color:var(--blue);}
  .contact-field textarea{min-height:140px; resize:vertical;}
  .contact-submit{
    width:100%; background:var(--ink); color:#fff; border:none; border-radius:8px;
    padding:14px; font-size:14px; font-weight:600; cursor:pointer;
  }
  .contact-submit:hover{background:var(--blue);}
  .contact-fallback{font-size:12px; color:var(--sub); margin-top:14px; text-align:center; line-height:1.6;}
</style>
<script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-1834400320261683" crossorigin="anonymous"></script>
</head>
<body>
<div class="shell">
  <nav class="nav">
    <div class="nav-in">
      <a class="brand" onclick="navigate('../index.html')">NTS Drive</a>
      <div class="links">
        <span onclick="navigate('../index.html')">Home</span>
        <span onclick="navigate('../post/index.html')">Post</span>
        <span onclick="navigate('../log/index.html')">Log</span>
        <span onclick="navigate('../diary/index.html')">Diary</span>
        <span onclick="navigate('../snap/index.html')">Snap</span>
        <span onclick="navigate('../film/index.html')">Film</span>
      </div>
    </div>
  </nav>

  <main class="main">
    <div class="crumb"><span class="crumb-link" onclick="navigate('../index.html')">내 드라이브</span> <span>／</span> <b>문의하기</b></div>
    <div class="page-head">
      <h1>문의하기</h1>
      <p>궁금한 점이나 하고 싶은 말씀을 남겨주세요.</p>
    </div>

    <div class="contact-form">
      <div class="contact-field">
        <label>제목</label>
        <input type="text" id="cTitle" placeholder="문의 제목을 입력해주세요">
      </div>
      <div class="contact-field">
        <label>내용</label>
        <textarea id="cBody" placeholder="문의 내용을 자세히 적어주세요"></textarea>
      </div>
      <div class="contact-field">
        <label>회신 받을 이메일 주소</label>
        <input type="email" id="cEmail" placeholder="example@email.com">
      </div>
      <button class="contact-submit" onclick="sendInquiry()">문의하기</button>
      <div class="contact-fallback">메일 앱이 안 열리거나 오류가 있다면,<br><b>myer@kakao.com</b>으로 바로 메일 보내주셔도 좋아요.</div>
    </div>
  </main>
</div>

<nav class="bottom-nav">
  <a onclick="navigate('../index.html')"><span class="bicon"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"><path d="M4 11l8-7 8 7"/><path d="M6 10v9h12v-9"/></svg></span>Home</a>
  <a onclick="navigate('../post/index.html')"><span class="bicon"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="5" width="18" height="14" rx="1.5"/><path d="M3.5 6.5l8.5 6.5 8.5-6.5"/></svg></span>Post</a>
  <a onclick="navigate('../log/index.html')"><span class="bicon"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"><rect x="4" y="3" width="16" height="18" rx="1.5"/><line x1="8" y1="8" x2="16" y2="8"/><line x1="8" y1="12" x2="16" y2="12"/><line x1="8" y1="16" x2="12" y2="16"/></svg></span>Log</a>
  <a onclick="navigate('../diary/index.html')"><span class="bicon"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"><rect x="4" y="3" width="16" height="18" rx="1.5"/><line x1="8" y1="3" x2="8" y2="21"/><circle cx="16" cy="12" r="1.4" fill="currentColor" stroke="none"/></svg></span>Diary</a>
  <a onclick="navigate('../snap/index.html')"><span class="bicon"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"><rect x="4" y="4" width="16" height="13" rx="2"/><circle cx="12" cy="10.5" r="3.2"/><path d="M9 4l1.2-1.5h3.6L15 4"/></svg></span>Snap</a>
  <a onclick="navigate('../film/index.html')"><span class="bicon"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="4" width="18" height="16" rx="1.5"/><rect x="4.3" y="6" width="1.3" height="1.3" rx="0.25"/><rect x="4.3" y="9.3" width="1.3" height="1.3" rx="0.25"/><rect x="4.3" y="12.7" width="1.3" height="1.3" rx="0.25"/><rect x="4.3" y="16" width="1.3" height="1.3" rx="0.25"/><rect x="18.4" y="6" width="1.3" height="1.3" rx="0.25"/><rect x="18.4" y="9.3" width="1.3" height="1.3" rx="0.25"/><rect x="18.4" y="12.7" width="1.3" height="1.3" rx="0.25"/><rect x="18.4" y="16" width="1.3" height="1.3" rx="0.25"/></svg></span>Film</a>
</nav>


<script>
  function navigate(url){
    document.body.classList.add('leaving');
    setTimeout(()=>{ window.location.href = url; }, 280);
  }
  window.addEventListener('pageshow', (e) => {
    if (e.persisted) document.body.classList.remove('leaving');
  });

  // Fix: body's pageIn animation animates `transform`, and with fill-mode:both that computed transform lingers after the animation completes — which makes body a containing block for any position:fixed descendant (bottom nav, floating buttons), anchoring them to the full page height instead of the viewport. Strip the animation once it's done so body goes back to a normal (untransformed) containing block.
  document.body.addEventListener('animationend', function onDone(e) {
    if (e.animationName === 'pageIn') document.body.classList.add('anim-settled');
  });

  function sendInquiry(){
    const title = document.getElementById('cTitle').value.trim();
    const body = document.getElementById('cBody').value.trim();
    const email = document.getElementById('cEmail').value.trim();

    if(!body){ alert('내용을 입력해주세요.'); return; }

    const subject = encodeURIComponent(title || '[NTS Drive] 문의하기');
    const mailBody = encodeURIComponent(`${body}\n\n---\n회신 받을 이메일: ${email || '(입력 안 함)'}`);
    window.location.href = `mailto:myer@kakao.com?subject=${subject}&body=${mailBody}`;
  }
</script>
</body>
</html>
