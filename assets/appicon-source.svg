<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <clipPath id="squircleClip">
      <rect x="0" y="0" width="512" height="512" rx="114"/>
    </clipPath>
    <linearGradient id="glassFill" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#F7F3EC" stop-opacity="0.55"/>
      <stop offset="100%" stop-color="#F7F3EC" stop-opacity="0.20"/>
    </linearGradient>
    <filter id="glassShadow" x="-50%" y="-50%" width="200%" height="200%">
      <feDropShadow dx="0" dy="10" stdDeviation="14" flood-color="#000000" flood-opacity="0.45"/>
    </filter>
    <filter id="highlightBlur" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="10"/>
    </filter>
  </defs>

  <!-- Background: ink black (unified system color, confirmed) -->
  <g clip-path="url(#squircleClip)">
    <rect x="0" y="0" width="512" height="512" fill="#17140F"/>
  </g>

  <!-- Folder: same silhouette as line version, now liquid glass (dev-doc spec: fill 0.55→0.20 cream, blur, saturate, soft border) -->
  <g transform="translate(-97.6 -98.9) scale(1.3)">
    <g filter="url(#glassShadow)">
      <path d="M156 196
               a20 20 0 0 1 20 -20
               h60
               l24 26
               h108
               a20 20 0 0 1 20 20
               v128
               a20 20 0 0 1 -20 20
               h-192
               a20 20 0 0 1 -20 -20
               z"
            fill="url(#glassFill)"/>
    </g>
  </g>
</svg>
