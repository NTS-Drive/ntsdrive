<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Endless Approval Stack | NTS_Arcade</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans+KR:wght@400;600;700&family=IBM+Plex+Mono:wght@400;600&display=swap" rel="stylesheet">
<link href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.css" rel="stylesheet">
<link rel="stylesheet" href="style.css">
<script src="../../analytics.js"></script>
</head>
<body>

<div class="app-bar">
  <a class="back-link" href="../index.html">&larr; Back to NTS_Arcade</a>
  <div class="app-title">Endless Approval Stack</div>
  <div class="score">Approved <span id="score">0</span></div>
</div>

<main class="stage">
  <div class="tray" id="tray">
    <div class="tray-label">Pending tray</div>
    <div class="paper-stack" id="paperStack"></div>
  </div>

  <button class="approve-btn" id="approveBtn">
    Approve
    <span class="approve-sub">Click to process</span>
  </button>

  <div class="combo" id="combo"></div>
</main>

<script src="script.js"></script>
</body>
</html>
