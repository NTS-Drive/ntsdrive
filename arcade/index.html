<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Arcade | NTS Drive</title>
<link rel="icon" type="image/svg+xml" href="../favicon.svg">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;600;700&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="../styles.css">
<script src="../analytics.js"></script>
</head>
<body>
<div class="shell">
  <nav class="nav">
    <div class="nav-in">
      <a class="brand" onclick="navigate('../index.html')"><div class="mark"></div>NTS Drive</a>
      <div class="links">
        <span class="active-link">Arcade</span>
        <span onclick="navigate('../fortune/index.html')">Fortune</span>
        <span onclick="navigate('../academy/index.html')">Academy</span>
        <span onclick="navigate('../index.html')">Community</span>
      </div>
    </div>
  </nav>

  <main class="main">
    <div class="crumb"><span class="crumb-link" onclick="navigate('../index.html')">내 드라이브</span> <span>／</span> <b>Arcade</b></div>
    <div class="page-head">
      <h1>Arcade</h1>
      <p>Quick single-session diversions for a busy workday.</p>
    </div>

    <div class="files" id="files-list"></div>
  </main>
</div>

<nav class="bottom-nav">
  <a onclick="navigate('../index.html')"><span class="bicon">⌂</span>홈</a>
  <a class="active"><span class="bicon">🕹️</span>Arcade</a>
  <a onclick="navigate('../fortune/index.html')"><span class="bicon">✦</span>Fortune</a>
  <a onclick="navigate('../academy/index.html')"><span class="bicon">▣</span>Academy</a>
</nav>

<script>
  function navigate(url){
    document.body.classList.add('leaving');
    setTimeout(()=>{ window.location.href = url; }, 280);
  }
  window.addEventListener('pageshow', (e) => {
    if (e.persisted) document.body.classList.remove('leaving');
  });

  const ICON_STYLE = {
    'formula-firewall': { emoji: '🕹️', fl: '#3E8CFF', fc: '#0071E3' },
    'number-streak':    { emoji: '🔢', fl: '#7FD8C4', fc: '#2FBBA0' },
    'paycheck-python':  { emoji: '🐍', fl: '#B7A3FF', fc: '#8B5CF6' },
    'card-memory':      { emoji: '🃏', fl: '#FFB199', fc: '#FF7A59' },
    'deck-dash':        { emoji: '🏃', fl: '#8FB4FF', fc: '#5B8DEF' }
  };
  const DEFAULT_ICON = { emoji: '🎮', fl: '#B7BAC2', fc: '#8A8D96' };

  async function loadFiles() {
    const list = document.getElementById('files-list');
    try {
      const items = (await (await fetch('titles.json', { cache: 'no-store' })).json())
        .filter(i => i.status === 'Live');

      if (items.length === 0) {
        list.innerHTML = '<div class="empty">아직 운영중인 타이틀이 없어요.</div>';
        return;
      }

      list.innerHTML = items.map(item => {
        const icon = ICON_STYLE[item.id] || DEFAULT_ICON;
        return `
          <a class="file" href="${item.entryPath}">
            <div class="fileicon" style="--fl:${icon.fl}; --fc:${icon.fc};"><div class="g">${icon.emoji}</div></div>
            <div class="body">
              <h4>${item.title}</h4>
              <p>${item.description}</p>
              <span class="status live">Live</span>
            </div>
          </a>
        `;
      }).join('');
    } catch (e) {
      list.innerHTML = '<div class="empty">목록을 불러오지 못했어요.</div>';
    }
  }
  loadFiles();
</script>
<script src="../feedback-widget.js" defer></script>
</body>
</html>
