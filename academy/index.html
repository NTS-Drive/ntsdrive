<!DOCTYPE html>
<html lang="en">
<head>

<meta name="viewport" content="width=device-width, initial-scale=1">

<link rel="icon" type="image/svg+xml" href="../favicon.svg">

<script src="../analytics.js"></script>
</head>
<body>
<div class="shell">
  <nav class="nav">
    <div class="nav-in">
      <a class="brand" onclick="navigate('../index.html')"><div class="mark"></div>NTS Drive</a>
      <div class="links">
        <span onclick="navigate('../post/index.html')">Post</span>
        <span onclick="navigate('../log/index.html')">Log</span>

        <span onclick="navigate('../film/index.html')">Film</span>
        <span onclick="navigate('../play/index.html')">Play</span>
      </div>
    </div>
  </nav>

  <main class="main">
    <div class="crumb"><span class="crumb-link" onclick="navigate('../index.html')">내 드라이브</span> <span>／</span> <b>Academy</b></div>
    <div class="page-head">
      <h1>Academy</h1>
      <p>바쁘다 바빠 현실 세계에 꼭 필요한 짧고 실용적인 학습 콘텐츠예요.</p>

        <button class="audience-btn active">직장인</button>

    </div>

    <div class="files" id="files-list"></div>

</div>

<nav class="bottom-nav">
  <a onclick="navigate('../index.html')"><span class="bicon"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"><path d="M4 11l8-7 8 7"/><path d="M6 10v9h12v-9"/></svg></span>홈</a>
  <a onclick="navigate('../post/index.html')"><span class="bicon"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="5" width="18" height="14" rx="1.5"/><path d="M3.5 6.5l8.5 6.5 8.5-6.5"/></svg></span>Post</a>
  <a onclick="navigate('../log/index.html')"><span class="bicon"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"><rect x="4" y="3" width="16" height="18" rx="1.5"/><line x1="8" y1="8" x2="16" y2="8"/><line x1="8" y1="12" x2="16" y2="12"/><line x1="8" y1="16" x2="12" y2="16"/></svg></span>Log</a>
  <a onclick="navigate('../snap/index.html')"><span class="bicon"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"><rect x="4" y="4" width="16" height="13" rx="2"/><circle cx="12" cy="10.5" r="3.2"/><path d="M9 4l1.2-1.5h3.6L15 4"/></svg></span>Snap</a>
  <a onclick="navigate('../film/index.html')"><span class="bicon"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="4" width="18" height="16" rx="1.5"/><rect x="4.3" y="6" width="1.3" height="1.3" rx="0.25"/><rect x="4.3" y="9.3" width="1.3" height="1.3" rx="0.25"/><rect x="4.3" y="12.7" width="1.3" height="1.3" rx="0.25"/><rect x="4.3" y="16" width="1.3" height="1.3" rx="0.25"/><rect x="18.4" y="6" width="1.3" height="1.3" rx="0.25"/><rect x="18.4" y="9.3" width="1.3" height="1.3" rx="0.25"/><rect x="18.4" y="12.7" width="1.3" height="1.3" rx="0.25"/><rect x="18.4" y="16" width="1.3" height="1.3" rx="0.25"/></svg></span>Film</a>

</nav>

<script>
  function navigate(url){
    document.body.classList.add('leaving');
    setTimeout(()=>{ window.location.href = url; }, 280);
  }
  window.addEventListener('pageshow', (e) => {
    if (e.persisted) document.body.classList.remove('leaving');
  });

  // Fix: body's pageIn animation animates `transform`, and with fill-mode:both that computed transform lingers after the animation completes — which makes body a containing block for any position:fixed descendant (bottom nav, floating buttons), anchoring them to the full page height instead of the viewport. Strip the animation once it's done so body goes back to a normal (untransformed) containing block.
  document.body.addEventListener('animationend', function onDone(e) {
    if (e.animationName === 'pageIn') document.body.classList.add('anim-settled');
  });

  const ICON_STYLE = {
    'spreadsheet-master':       { emoji: '📊', fl: '#5FE0C7', fc: '#14B8A6' },
    'business-english-master':  { emoji: '💼', fl: '#7FE0D0', fc: '#0E9E88' },
    'ai-usage-master':          { emoji: '🤖', fl: '#8FE8D8', fc: '#2FBBA0' }
  };
  const DEFAULT_ICON = { emoji: '🎓', fl: '#B7BAC2', fc: '#8A8D96' };

  async function loadFiles() {
    const list = document.getElementById('files-list');
    try {
      const items = (await (await fetch('items.json', { cache: 'no-store' })).json())
        .filter(i => i.status === 'Live');

      if (items.length === 0) {
        list.innerHTML = '<div class="empty">아직 운영중인 콘텐츠가 없어요.</div>';
        return;
      }

      list.innerHTML = items.map(item => {
        const icon = ICON_STYLE[item.id] || DEFAULT_ICON;
        return `
          <a class="file" href="${item.entryPath}">
            <div class="fileicon" style="--fl:${icon.fl}; --fc:${icon.fc};"><div class="g">${icon.emoji}</div></div>
            <div class="body">
              <h4>${item.title}</h4>
              <p>${item.description}</p>
              <span class="status live">Live</span>
            </div>
          </a>
        `;
      }).join('');
    } catch (e) {
      list.innerHTML = '<div class="empty">목록을 불러오지 못했어요.</div>';
    }
  }
  loadFiles();
</script>
</body>
</html>
