<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<link rel="icon" type="image/svg+xml" href="../favicon.svg">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;600;700&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="../styles.css">
<script src="../analytics.js"></script>
</head>
<body>
<div class="shell">
  <nav class="nav">
    <div class="nav-in">
      <a class="brand" onclick="navigate('../index.html')"><div class="mark"></div>NTS Drive</a>
      <div class="links">
        <span onclick="navigate('../post/index.html')">Post</span>
        <span onclick="navigate('../arcade/index.html')">Arcade</span>
        <span onclick="navigate('../fortune/index.html')">Fortune</span>
        <span class="active-link">Academy</span>
      </div>
    </div>
  </nav>

  <main class="main">
    <div class="crumb"><span class="crumb-link" onclick="navigate('../index.html')">내 드라이브</span> <span>／</span> <b>Academy</b></div>
    <div class="page-head">
      <h1>Academy</h1>
      <p>직장인을 위한 짧고 실용적인 학습 콘텐츠예요.</p>
    </div>

    <div class="files" id="files-list"></div>
  </main>
</div>

<nav class="bottom-nav">
  <a onclick="navigate('../index.html')"><span class="bicon"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"><path d="M4 11l8-7 8 7"/><path d="M6 10v9h12v-9"/></svg></span>홈</a>
  <a onclick="navigate('../post/index.html')"><span class="bicon"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="5" width="18" height="14" rx="1.5"/><path d="M3.5 6.5l8.5 6.5 8.5-6.5"/></svg></span>Post</a>
  <a onclick="navigate('../arcade/index.html')"><span class="bicon"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"><rect x="4" y="15" width="16" height="6" rx="1.8"/><line x1="12" y1="15" x2="12" y2="6.5"/><circle cx="12" cy="5" r="2.3"/></svg></span>Arcade</a>
  <a onclick="navigate('../fortune/index.html')"><span class="bicon"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linejoin="round"><path d="M12 3l1.8 5.2L19 10l-5.2 1.8L12 17l-1.8-5.2L5 10l5.2-1.8z"/></svg></span>Fortune</a>
  <a class="active"><span class="bicon"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"><path d="M12 6.5c-1.9-1.3-4.2-1.8-6.8-1.6v12.6c2.6-.2 4.9.3 6.8 1.6 1.9-1.3 4.2-1.8 6.8-1.6V4.9c-2.6-.2-4.9.3-6.8 1.6z"/><line x1="12" y1="6.5" x2="12" y2="19.1"/></svg></span>Academy</a>
</nav>

<script>
  function navigate(url){
    document.body.classList.add('leaving');
    setTimeout(()=>{ window.location.href = url; }, 280);
  }
  window.addEventListener('pageshow', (e) => {
    if (e.persisted) document.body.classList.remove('leaving');
  });

  const ICON_STYLE = {
    'spreadsheet-master':       { emoji: '📊', fl: '#5FE0C7', fc: '#14B8A6' },
    'business-english-master':  { emoji: '💼', fl: '#7FE0D0', fc: '#0E9E88' },
    'ai-usage-master':          { emoji: '🤖', fl: '#8FE8D8', fc: '#2FBBA0' }
  };
  const DEFAULT_ICON = { emoji: '🎓', fl: '#B7BAC2', fc: '#8A8D96' };

  async function loadFiles() {
    const list = document.getElementById('files-list');
    try {
      const items = (await (await fetch('items.json', { cache: 'no-store' })).json())
        .filter(i => i.status === 'Live');

      if (items.length === 0) {
        list.innerHTML = '<div class="empty">아직 운영중인 콘텐츠가 없어요.</div>';
        return;
      }

      list.innerHTML = items.map(item => {
        const icon = ICON_STYLE[item.id] || DEFAULT_ICON;
        return `
          <a class="file" href="${item.entryPath}">
            <div class="fileicon" style="--fl:${icon.fl}; --fc:${icon.fc};"><div class="g">${icon.emoji}</div></div>
            <div class="body">
              <h4>${item.title}</h4>
              <p>${item.description}</p>
              <span class="status live">Live</span>
            </div>
          </a>
        `;
      }).join('');
    } catch (e) {
      list.innerHTML = '<div class="empty">목록을 불러오지 못했어요.</div>';
    }
  }
  loadFiles();
</script>
<script src="../feedback-widget.js" defer></script>
</body>
</html>
