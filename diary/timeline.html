<script>
  function navigate(url){ document.body.classList.add('leaving'); setTimeout(()=>{ window.location.href = url; }, 280); }
  function trackEvent(name, params) { try { if (typeof gtag === 'function') gtag('event', name, params || {}); } catch (e) {} }
  trackEvent('diary_timeline_opened');

  document.body.addEventListener('animationend', function onDone(e) {
    if (e.animationName === 'pageIn') document.body.classList.add('anim-settled');
  });

  const WEEKDAY_KR = ['일', '월', '화', '수', '목', '금', '토'];

  /* ---------------- 주간 리포트 카드 ---------------- */
  function renderWeeklyCard() {
    const r = NTSDiary.getWeeklyReport();
    const bar = r.ratios.map(x => `<span style="width:${x.percent}%; background:${x.color}"></span>`).join('');
    const legend = r.ratios.map(x => `<span class="item"><span class="dot" style="background:${x.color}"></span>${x.emoji} ${x.label} ${x.percent}%</span>`).join('');
    const guide = r.actionGuide
      ? `<div class="weekly-guide"><span class="msg-label">이럴 땐 이런 건 어떨까요</span>${r.actionGuide.map(g => '· ' + g).join('<br>')}</div>`
      : '';

    document.getElementById('weeklyCard').innerHTML = `
      <div class="weekly-card">
        <div class="range">${r.weekStart} ~ ${r.weekEnd} · 이번 주 기록 ${r.total}개</div>
        ${r.total ? `<div class="weekly-bar">${bar}</div><div class="weekly-legend">${legend}</div>` : ''}
        <div class="weekly-message">
          <div class="weekly-encourage"><span class="msg-label">이번 주 한마디</span>${r.encourage}</div>
          ${guide}
        </div>
      </div>`;
  }

  /* ---------------- 캘린더 (월요일 시작, 올해 1~12월 내에서만 이동) ---------------- */
  const NOW = new Date();
  const CUR_YEAR = NOW.getFullYear();
  const CUR_MONTH = NOW.getMonth();
  let calMonth = CUR_MONTH; // 0~11, calYear는 항상 CUR_YEAR로 고정 (연간 리셋 정책과 일치)

  let openDayDetail = null;
  function renderCalendar() {
    const el = document.getElementById('calendarView');
    const entries = NTSDiary.getEntries();
    const byDate = {};
    entries.forEach(e => { (byDate[e.date] = byDate[e.date] || []).push(e); });

    const first = new Date(CUR_YEAR, calMonth, 1);
    const startDow = (first.getDay() + 6) % 7; // 0=월 ... 6=일
    const daysInMonth = new Date(CUR_YEAR, calMonth + 1, 0).getDate();
    const todayStr = NTSDiary.todayStr();

    let cells = '';
    for (let i = 0; i < startDow; i++) cells += `<div class="cal-cell empty"></div>`;
    for (let d = 1; d <= daysInMonth; d++) {
      const dateStr = `${CUR_YEAR}-${String(calMonth+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
      const dayEntries = byDate[dateStr] || [];
      let layers = '';
      if (dayEntries.length) {
        const counts = {};
        NTSDiary.MOODS.forEach(m => { counts[m.id] = 0; });
        dayEntries.forEach(e => { counts[e.mood] = (counts[e.mood] || 0) + 1; });
        const total = dayEntries.length;
        layers = NTSDiary.MOODS.filter(m => counts[m.id] > 0).map(m => {
          const pct = (counts[m.id] / total) * 100;
          return `<span style="height:${pct}%; background:${m.color}"></span>`;
        }).join('');
      }
      cells += `<div class="cal-cell${dateStr === todayStr ? ' today' : ''}${dayEntries.length ? ' has-entry' : ''}" data-date="${dateStr}">
        <span class="daynum">${d}</span>
        ${layers ? `<div class="cal-layers">${layers}</div>` : ''}
      </div>`;
    }

    const monthOptions = Array.from({length: 12}, (_, i) =>
      `<option value="${i}" ${i === calMonth ? 'selected' : ''}>${CUR_YEAR}년 ${i + 1}월</option>`).join('');

    el.innerHTML = `
      <div class="cal-head">
        <button id="calPrev" ${calMonth === 0 ? 'disabled' : ''}>‹</button>
        <select id="calMonthSelect" class="picker-select">${monthOptions}</select>
        <button id="calNext" ${calMonth === 11 ? 'disabled' : ''}>›</button>
        <button id="calThisMonth" class="picker-jump">이번 달</button>
      </div>
      <div class="cal-grid">
        ${['월','화','수','목','금','토','일'].map(d => `<div class="cal-dow">${d}</div>`).join('')}
        ${cells}
      </div>
      <div id="calDayDetail"></div>`;

    document.getElementById('calPrev').onclick = () => { if (calMonth > 0) { calMonth--; renderCalendar(); } };
    document.getElementById('calNext').onclick = () => { if (calMonth < 11) { calMonth++; renderCalendar(); } };
    document.getElementById('calMonthSelect').onchange = (e) => { calMonth = parseInt(e.target.value, 10); renderCalendar(); };
    document.getElementById('calThisMonth').onclick = () => { calMonth = CUR_MONTH; renderCalendar(); };

    el.querySelectorAll('.cal-cell.has-entry').forEach(cell => {
      cell.onclick = () => {
        const date = cell.dataset.date;
        if (openDayDetail === date) {
          openDayDetail = null;
          document.getElementById('calDayDetail').innerHTML = '';
          el.querySelectorAll('.cal-cell').forEach(c => c.classList.remove('active-day'));
          return;
        }
        openDayDetail = date;
        el.querySelectorAll('.cal-cell').forEach(c => c.classList.toggle('active-day', c.dataset.date === date));
        renderDayDetail(date, byDate[date] || []);
      };
    });
  }

  function buildEntryRow(e, opts) {
    opts = opts || {};
    const m = NTSDiary.getMood(e.mood);
    const created = new Date(e.createdAt);
    const hh = String(created.getHours()).padStart(2, '0');
    const mm = String(created.getMinutes()).padStart(2, '0');

    if (opts.mode === 'compact') {
      // 캘린더 날짜 클릭 시 요약: 이모지 없이 한 줄 요약 + (있으면) 메모
      const causesText = e.causes.length ? ' · ' + e.causes.join(', ') : '';
      const quote = e.text ? `<div class="tquote">${e.text}</div>` : '';
      return `<div class="day-summary-row">
        <div class="tdate">${hh}:${mm} · ${m.label}${causesText}</div>
        ${quote}
      </div>`;
    }

    // 타임라인: 컬러+이모지 아바타가 있는 카드형
    let dateLabel = `${hh}:${mm}`;
    if (opts.showDate) {
      const d = new Date(e.date + 'T00:00:00');
      const dow = WEEKDAY_KR[d.getDay()];
      dateLabel = `${e.date} (${dow}) ${hh}:${mm}`;
    }
    const tags = e.causes.length ? `<div class="entry-tags">${e.causes.map(c => `<span class="entry-tag">${c}</span>`).join('')}</div>` : '';
    const quote = e.text ? `<div class="tquote">${e.text}</div>` : '';
    return `<div class="entry-row">
      <span class="entry-avatar" style="background:${m.color}">${m.emoji}</span>
      <div class="entry-content">
        <div class="entry-head"><span class="entry-mood">${m.label}</span><span class="entry-time">${dateLabel}</span></div>
        ${tags}
        ${quote}
      </div>
    </div>`;
  }

  function renderDayDetail(dateStr, dayEntries) {
    const detailEl = document.getElementById('calDayDetail');
    if (!detailEl) return;
    const d = new Date(dateStr + 'T00:00:00');
    const dow = WEEKDAY_KR[d.getDay()];
    const rows = dayEntries.slice().sort((a, b) => b.createdAt - a.createdAt)
      .map(e => buildEntryRow(e, { mode: 'compact' })).join('');
    detailEl.innerHTML = `<div class="day-detail"><div class="day-detail-head">${dateStr} (${dow})</div>${rows}</div>`;
  }

  /* ---------------- 타임라인: 주 단위 페이징 (올해 주차 내에서만 이동) ---------------- */
  const CUR_MONDAY = NTSDiary.getMondayOf(NTSDiary.todayStr());

  // 올해에 속한 모든 월요일 목록 생성
  function buildYearMondays(year) {
    const list = [];
    const d = new Date(year, 0, 1);
    const firstDow = (d.getDay() + 6) % 7;
    d.setDate(d.getDate() - firstDow); // 그 주의 월요일로 이동 (전년도일 수 있음)
    while (true) {
      const monday = NTSDiary.todayStr(d);
      // 그 주에 올해 날짜가 하나라도 포함되면 목록에 추가
      const sun = new Date(d); sun.setDate(sun.getDate() + 6);
      if (d.getFullYear() === year || sun.getFullYear() === year) {
        list.push(monday);
      }
      d.setDate(d.getDate() + 7);
      if (d.getFullYear() > year) break;
    }
    return list;
  }
  const YEAR_MONDAYS = buildYearMondays(CUR_YEAR);
  let tlWeekMonday = CUR_MONDAY;

  function renderTimeline() {
    const el = document.getElementById('timelineView');
    const monday = tlWeekMonday;
    const mondayDate = new Date(monday + 'T00:00:00');
    const sundayDate = new Date(mondayDate); sundayDate.setDate(sundayDate.getDate() + 6);
    const sunday = NTSDiary.todayStr(sundayDate);

    const entries = NTSDiary.getEntries().filter(e => e.date >= monday && e.date <= sunday);

    const list = entries.length
      ? `<div class="timeline-list">${entries.map(e => buildEntryRow(e, { mode: 'card', showDate: true })).join('')}</div>`
      : `<div class="timeline-empty">이 주에는 기록이 없어요.</div>`;

    const idx = YEAR_MONDAYS.indexOf(monday);
    const weekOptions = YEAR_MONDAYS.map((mon, i) => {
      const sd = new Date(mon + 'T00:00:00'); sd.setDate(sd.getDate() + 6);
      const label = `${mon} ~ ${NTSDiary.todayStr(sd)}`;
      return `<option value="${mon}" ${mon === monday ? 'selected' : ''}>${label}</option>`;
    }).join('');

    el.innerHTML = `
      <div class="tl-head">
        <button id="tlPrev" ${idx <= 0 ? 'disabled' : ''}>‹</button>
        <select id="tlWeekSelect" class="picker-select">${weekOptions}</select>
        <button id="tlNext" ${idx >= YEAR_MONDAYS.length - 1 ? 'disabled' : ''}>›</button>
        <button id="tlThisWeek" class="picker-jump">이번 주</button>
      </div>
      ${list}`;

    document.getElementById('tlPrev').onclick = () => { if (idx > 0) { tlWeekMonday = YEAR_MONDAYS[idx - 1]; renderTimeline(); } };
    document.getElementById('tlNext').onclick = () => { if (idx < YEAR_MONDAYS.length - 1) { tlWeekMonday = YEAR_MONDAYS[idx + 1]; renderTimeline(); } };
    document.getElementById('tlWeekSelect').onchange = (e) => { tlWeekMonday = e.target.value; renderTimeline(); };
    document.getElementById('tlThisWeek').onclick = () => { tlWeekMonday = CUR_MONDAY; renderTimeline(); };
  }

  /* ---------------- 초기화 ---------------- */
  renderWeeklyCard();
  renderCalendar();
  renderTimeline();
</script>
