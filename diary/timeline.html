<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>모아보기 | Diary | NTS Drive</title>
<link rel="icon" type="image/svg+xml" href="../favicon.svg">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;600;700&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="../styles.css">
<link rel="stylesheet" href="style.css">
<script src="../analytics.js"></script>
<script src="shared.js"></script>
</head>
<body>

<nav class="nav">
  <div class="nav-in">
    <a class="brand" onclick="navigate('../index.html')"><img class="mark" src="../favicon.svg" alt="NTS Drive" width="26" height="26">NTS Drive</a>
    <div class="links">
      <span onclick="navigate('../post/index.html')">Post</span>
      <span onclick="navigate('../log/index.html')">Log</span>
      <span class="active-link">Diary</span>
      <span onclick="navigate('../snap/index.html')">Snap</span>
      <span onclick="navigate('../film/index.html')">Film</span>
    </div>
  </div>
</nav>

<div class="diary-wrap">
  <div class="diary-step-label">DIARY · 모아보기</div>
  <div class="diary-title">그동안의 기록들</div>

  <div id="weeklyCard"></div>

  <div class="view-toggle">
    <button id="btnCalendar" class="active">캘린더</button>
    <button id="btnTimeline">타임라인</button>
  </div>

  <div id="calendarView"></div>
  <div id="timelineView" style="display:none;"></div>
</div>

<nav class="bottom-nav">
  <a onclick="navigate('../index.html')"><span class="bicon"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"><path d="M4 11l8-7 8 7"/><path d="M6 10v9h12v-9"/></svg></span>홈</a>
  <a onclick="navigate('../post/index.html')"><span class="bicon"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="5" width="18" height="14" rx="1.5"/><path d="M3.5 6.5l8.5 6.5 8.5-6.5"/></svg></span>Post</a>
  <a onclick="navigate('../log/index.html')"><span class="bicon"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"><rect x="4" y="3" width="16" height="18" rx="1.5"/><line x1="8" y1="8" x2="16" y2="8"/><line x1="8" y1="12" x2="16" y2="12"/><line x1="8" y1="16" x2="12" y2="16"/></svg></span>Log</a>
  <a class="active"><span class="bicon"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"><rect x="4" y="3" width="16" height="18" rx="1.5"/><line x1="8" y1="3" x2="8" y2="21"/><circle cx="16" cy="12" r="1.4" fill="currentColor" stroke="none"/></svg></span>Diary</a>
  <a onclick="navigate('../snap/index.html')"><span class="bicon"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"><rect x="4" y="4" width="16" height="13" rx="2"/><circle cx="12" cy="10.5" r="3.2"/><path d="M9 4l1.2-1.5h3.6L15 4"/></svg></span>Snap</a>
  <a onclick="navigate('../film/index.html')"><span class="bicon"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="4" width="18" height="16" rx="1.5"/></svg></span>Film</a>
</nav>

<script>
  function navigate(url){ document.body.classList.add('leaving'); setTimeout(()=>{ window.location.href = url; }, 280); }
  function trackEvent(name, params) { try { if (typeof gtag === 'function') gtag('event', name, params || {}); } catch (e) {} }
  trackEvent('diary_timeline_opened');

  /* ---------------- 주간 리포트 카드 ---------------- */
  function renderWeeklyCard() {
    const r = NTSDiary.getWeeklyReport();
    const bar = r.ratios.map(x => `<span style="width:${x.percent}%; background:${x.color}"></span>`).join('');
    const legend = r.ratios.map(x => `<span class="item"><span class="dot" style="background:${x.color}"></span>${x.label} ${x.percent}%</span>`).join('');
    const guide = r.actionGuide
      ? `<div class="weekly-guide"><b>이럴 땐 이런 건 어떨까요?</b><br>${r.actionGuide.map(g => '· ' + g).join('<br>')}</div>`
      : '';

    document.getElementById('weeklyCard').innerHTML = `
      <div class="weekly-card">
        <div class="range">${r.weekStart} ~ ${r.weekEnd} · 이번 주 기록 ${r.total}개</div>
        ${r.total ? `<div class="weekly-bar">${bar}</div><div class="weekly-legend">${legend}</div>` : ''}
        <div class="weekly-encourage">${r.encourage}</div>
        ${guide}
      </div>`;
  }

  /* ---------------- 타임라인(리스트) ---------------- */
  function renderTimeline() {
    const entries = NTSDiary.getEntries();
    const el = document.getElementById('timelineView');
    if (!entries.length) {
      el.innerHTML = `<div class="timeline-empty">아직 기록이 없어요.<br>오늘의 감정을 남겨보세요.</div>`;
      return;
    }
    el.innerHTML = `<div class="timeline-list">${entries.map(e => {
      const m = NTSDiary.getMood(e.mood);
      return `<div class="timeline-item">
        <span class="ticon" style="background:${m.color}">${m.icon}</span>
        <div class="tbody">
          <div class="tdate">${e.date} · ${m.label}${e.causes.length ? ' · ' + e.causes.join(', ') : ''}</div>
          ${e.text ? `<div class="ttext">${e.text}</div>` : ''}
        </div>
      </div>`;
    }).join('')}</div>`;
  }

  /* ---------------- 캘린더 ---------------- */
  let calYear, calMonth; // 0-indexed month
  function renderCalendar() {
    const el = document.getElementById('calendarView');
    const entries = NTSDiary.getEntries();
    const byDate = {};
    entries.forEach(e => { (byDate[e.date] = byDate[e.date] || []).push(e); });

    const first = new Date(calYear, calMonth, 1);
    const startDow = first.getDay(); // 0=일
    const daysInMonth = new Date(calYear, calMonth + 1, 0).getDate();
    const todayStr = NTSDiary.todayStr();

    let cells = '';
    for (let i = 0; i < startDow; i++) cells += `<div class="cal-cell empty"></div>`;
    for (let d = 1; d <= daysInMonth; d++) {
      const dateStr = `${calYear}-${String(calMonth+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
      const dayEntries = byDate[dateStr] || [];
      const layers = dayEntries.map(e => `<span style="background:${NTSDiary.getMood(e.mood).color}"></span>`).join('');
      cells += `<div class="cal-cell${dateStr === todayStr ? ' today' : ''}">
        <span class="daynum">${d}</span>
        <div class="layers">${layers}</div>
      </div>`;
    }

    el.innerHTML = `
      <div class="cal-head">
        <button id="calPrev">‹</button>
        <h3>${calYear}년 ${calMonth + 1}월</h3>
        <button id="calNext">›</button>
      </div>
      <div class="cal-grid">
        ${['일','월','화','수','목','금','토'].map(d => `<div class="cal-dow">${d}</div>`).join('')}
        ${cells}
      </div>`;

    document.getElementById('calPrev').onclick = () => { calMonth--; if (calMonth < 0) { calMonth = 11; calYear--; } renderCalendar(); };
    document.getElementById('calNext').onclick = () => { calMonth++; if (calMonth > 11) { calMonth = 0; calYear++; } renderCalendar(); };
  }

  /* ---------------- 초기화 & 토글 ---------------- */
  const now = new Date();
  calYear = now.getFullYear();
  calMonth = now.getMonth();

  renderWeeklyCard();
  renderCalendar();
  renderTimeline();

  document.getElementById('btnCalendar').onclick = () => {
    document.getElementById('btnCalendar').classList.add('active');
    document.getElementById('btnTimeline').classList.remove('active');
    document.getElementById('calendarView').style.display = 'block';
    document.getElementById('timelineView').style.display = 'none';
  };
  document.getElementById('btnTimeline').onclick = () => {
    document.getElementById('btnTimeline').classList.add('active');
    document.getElementById('btnCalendar').classList.remove('active');
    document.getElementById('timelineView').style.display = 'block';
    document.getElementById('calendarView').style.display = 'none';
  };
</script>
</body>
</html>
