<script>
  function navigate(url){ document.body.classList.add('leaving'); setTimeout(()=>{ window.location.href = url; }, 280); }
  function trackEvent(name, params) { try { if (typeof gtag === 'function') gtag('event', name, params || {}); } catch (e) {} }
  trackEvent('diary_timeline_opened');

  document.body.addEventListener('animationend', function onDone(e) {
    if (e.animationName === 'pageIn') document.body.classList.add('anim-settled');
  });

  const WEEKDAY_KR = ['일', '월', '화', '수', '목', '금', '토'];

  /* ---------------- 주간 리포트 카드 ---------------- */
  function renderWeeklyCard() {
    const r = NTSDiary.getWeeklyReport();
    const bar = r.ratios.map(x => `<span style="width:${x.percent}%; background:${x.color}"></span>`).join('');
    const legend = r.ratios.map(x => `<span class="item"><span class="dot" style="background:${x.color}"></span>${x.emoji} ${x.label} ${x.percent}%</span>`).join('');
    const guide = r.actionGuide
      ? `<div class="weekly-guide">💡 <b>이럴 땐 이런 건 어떨까요?</b><br>${r.actionGuide.map(g => '· ' + g).join('<br>')}</div>`
      : '';

    document.getElementById('weeklyCard').innerHTML = `
      <div class="weekly-card">
        <div class="range">${r.weekStart} ~ ${r.weekEnd} · 이번 주 기록 ${r.total}개</div>
        ${r.total ? `<div class="weekly-bar">${bar}</div><div class="weekly-legend">${legend}</div>` : ''}
        <div class="weekly-encourage">💌 ${r.encourage}</div>
        ${guide}
      </div>`;
  }

  /* ---------------- 캘린더 (월요일 시작) ---------------- */
  let calYear, calMonth;
  function renderCalendar() {
    const el = document.getElementById('calendarView');
    const entries = NTSDiary.getEntries();
    const byDate = {};
    entries.forEach(e => { (byDate[e.date] = byDate[e.date] || []).push(e); });

    const first = new Date(calYear, calMonth, 1);
    const startDow = (first.getDay() + 6) % 7; // 0=월 ... 6=일
    const daysInMonth = new Date(calYear, calMonth + 1, 0).getDate();
    const todayStr = NTSDiary.todayStr();

    let cells = '';
    for (let i = 0; i < startDow; i++) cells += `<div class="cal-cell empty"></div>`;
    for (let d = 1; d <= daysInMonth; d++) {
      const dateStr = `${calYear}-${String(calMonth+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
      const dayEntries = byDate[dateStr] || [];
      const layers = dayEntries.map(e => `<span style="background:${NTSDiary.getMood(e.mood).color}"></span>`).join('');
      cells += `<div class="cal-cell${dateStr === todayStr ? ' today' : ''}">
        <span class="daynum">${d}</span>
        <div class="layers">${layers}</div>
      </div>`;
    }

    el.innerHTML = `
      <div class="cal-head">
        <button id="calPrev">‹</button>
        <h3>${calYear}년 ${calMonth + 1}월</h3>
        <button id="calNext">›</button>
      </div>
      <div class="cal-grid">
        ${['월','화','수','목','금','토','일'].map(d => `<div class="cal-dow">${d}</div>`).join('')}
        ${cells}
      </div>`;

    document.getElementById('calPrev').onclick = () => { calMonth--; if (calMonth < 0) { calMonth = 11; calYear--; } renderCalendar(); };
    document.getElementById('calNext').onclick = () => { calMonth++; if (calMonth > 11) { calMonth = 0; calYear++; } renderCalendar(); };
  }

  /* ---------------- 타임라인: 주 단위 페이징 ---------------- */
  let tlWeekMonday; // YYYY-MM-DD (월요일)
  function renderTimeline() {
    const el = document.getElementById('timelineView');
    const monday = tlWeekMonday;
    const mondayDate = new Date(monday + 'T00:00:00');
    const sundayDate = new Date(mondayDate); sundayDate.setDate(sundayDate.getDate() + 6);
    const sunday = NTSDiary.todayStr(sundayDate);

    const entries = NTSDiary.getEntries().filter(e => e.date >= monday && e.date <= sunday);

    const list = entries.length
      ? `<div class="timeline-list">${entries.map(e => {
          const m = NTSDiary.getMood(e.mood);
          const dow = WEEKDAY_KR[new Date(e.date + 'T00:00:00').getDay()];
          return `<div class="timeline-item">
            <span class="ticon" style="background:${m.color}">${m.emoji}</span>
            <div class="tbody">
              <div class="tdate">${e.date} (${dow}) · ${m.label}${e.causes.length ? ' · ' + e.causes.join(', ') : ''}</div>
              ${e.text ? `<div class="ttext">${e.text}</div>` : ''}
            </div>
          </div>`;
        }).join('')}</div>`
      : `<div class="timeline-empty">이 주에는 기록이 없어요.</div>`;

    el.innerHTML = `
      <div class="tl-head">
        <button id="tlPrev">‹</button>
        <h3>${monday} ~ ${sunday}</h3>
        <button id="tlNext">›</button>
      </div>
      ${list}`;

    document.getElementById('tlPrev').onclick = () => { shiftWeek(-7); };
    document.getElementById('tlNext').onclick = () => { shiftWeek(7); };
  }
  function shiftWeek(days) {
    const d = new Date(tlWeekMonday + 'T00:00:00');
    d.setDate(d.getDate() + days);
    tlWeekMonday = NTSDiary.todayStr(d);
    renderTimeline();
  }

  /* ---------------- 초기화 ---------------- */
  const now = new Date();
  calYear = now.getFullYear();
  calMonth = now.getMonth();
  tlWeekMonday = NTSDiary.getMondayOf(NTSDiary.todayStr());

  renderWeeklyCard();
  renderCalendar();
  renderTimeline();
</script>
</body>
