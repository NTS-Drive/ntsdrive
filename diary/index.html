<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Diary | NTS Drive</title>
<link rel="icon" type="image/svg+xml" href="../favicon.svg">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;600;700&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="../styles.css">
<link rel="stylesheet" href="style.css">
<script src="../analytics.js"></script>
<script src="shared.js"></script>
</head>
<body>

<nav class="nav">
  <div class="nav-in">
    <a class="brand" onclick="navigate('../index.html')"><img class="mark" src="../favicon.svg" alt="NTS Drive" width="26" height="26">NTS Drive</a>
    <div class="links">
      <span onclick="navigate('../post/index.html')">Post</span>
      <span onclick="navigate('../log/index.html')">Log</span>
      <span class="active-link">Diary</span>
      <span onclick="navigate('../snap/index.html')">Snap</span>
      <span onclick="navigate('../film/index.html')">Film</span>
    </div>
  </div>
</nav>

<div class="diary-wrap">

  <!-- STEP 1: 감정 선택 -->
  <div id="step1">
    <div class="diary-step-label">STEP 1 · 오늘 기분이 어떤가요?</div>
    <div class="diary-title">지금 마음을 기록해볼까요</div>
    <div class="mood-grid" id="moodGrid"></div>
  </div>

  <!-- STEP 2: 원인 선택 -->
  <div id="step2" style="display:none;">
    <div class="diary-step-label">STEP 2 · 왜 그런 기분이 들었나요? (선택)</div>
    <div class="diary-title" id="step2Title"></div>
    <div id="causeGroups"></div>
  </div>

  <!-- STEP 3: 짧은 메모 -->
  <div id="step3" style="display:none;">
    <div class="diary-step-label">STEP 3 · 한 줄로 남겨볼까요 (선택, 최대 20자)</div>
    <div class="diary-title">오늘을 한 줄로 표현하면</div>
    <textarea class="diary-text-input" id="textInput" rows="3" maxlength="20" placeholder="예: 오늘은 그냥 무난했다"></textarea>
    <div class="char-count"><span id="charCount">0</span>/20</div>
    <button class="diary-save-btn" id="saveBtn">기록 저장하기</button>
  </div>

</div>

<div class="diary-toast" id="toast">오늘의 감정이 저장됐어요 🤍</div>

<nav class="bottom-nav">
  <a onclick="navigate('../index.html')"><span class="bicon"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"><path d="M4 11l8-7 8 7"/><path d="M6 10v9h12v-9"/></svg></span>홈</a>
  <a onclick="navigate('../post/index.html')"><span class="bicon"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="5" width="18" height="14" rx="1.5"/><path d="M3.5 6.5l8.5 6.5 8.5-6.5"/></svg></span>Post</a>
  <a onclick="navigate('../log/index.html')"><span class="bicon"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"><rect x="4" y="3" width="16" height="18" rx="1.5"/><line x1="8" y1="8" x2="16" y2="8"/><line x1="8" y1="12" x2="16" y2="12"/><line x1="8" y1="16" x2="12" y2="16"/></svg></span>Log</a>
  <a class="active"><span class="bicon"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"><rect x="4" y="3" width="16" height="18" rx="1.5"/><line x1="8" y1="3" x2="8" y2="21"/><circle cx="16" cy="12" r="1.4" fill="currentColor" stroke="none"/></svg></span>Diary</a>
  <a onclick="navigate('../snap/index.html')"><span class="bicon"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"><rect x="4" y="4" width="16" height="13" rx="2"/><circle cx="12" cy="10.5" r="3.2"/><path d="M9 4l1.2-1.5h3.6L15 4"/></svg></span>Snap</a>
  <a onclick="navigate('../film/index.html')"><span class="bicon"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="4" width="18" height="16" rx="1.5"/></svg></span>Film</a>
</nav>

<script>
  function navigate(url){ document.body.classList.add('leaving'); setTimeout(()=>{ window.location.href = url; }, 280); }
  function trackEvent(name, params) { try { if (typeof gtag === 'function') gtag('event', name, params || {}); } catch (e) {} }

  let selectedMood = null;
  let selectedCauses = [];

  // ---- STEP 1: 감정 그리드 렌더 ----
  const moodGrid = document.getElementById('moodGrid');
  NTSDiary.MOODS.forEach(m => {
    const cell = document.createElement('div');
    cell.className = 'mood-cell';
    cell.style.setProperty('--mood-color', m.color);
    cell.innerHTML = m.icon + `<span>${m.label}</span>`;
    cell.onclick = () => selectMood(m, cell);
    moodGrid.appendChild(cell);
  });

  function selectMood(mood, cellEl) {
    selectedMood = mood.id;
    trackEvent('diary_mood_selected', { mood: mood.id });
    [...moodGrid.children].forEach(c => c.classList.remove('selected'));
    cellEl.classList.add('selected');
    document.getElementById('step2Title').textContent = `${mood.label}, 어떤 이유였을까요?`;
    setTimeout(() => goToStep(2), 220);
  }

  // ---- STEP 2: 원인 태그 렌더 ----
  const causeGroups = document.getElementById('causeGroups');
  Object.entries(NTSDiary.CAUSES).forEach(([groupName, tags]) => {
    const group = document.createElement('div');
    group.className = 'cause-group';
    group.innerHTML = `<h4>${groupName}</h4><div class="cause-tags">${tags.map(t => `<span class="cause-tag" data-tag="${t}">${t}</span>`).join('')}</div>`;
    causeGroups.appendChild(group);
  });
  causeGroups.addEventListener('click', (e) => {
    const tag = e.target.closest('.cause-tag');
    if (!tag) return;
    const val = tag.dataset.tag;
    if (selectedCauses.includes(val)) {
      selectedCauses = selectedCauses.filter(c => c !== val);
      tag.classList.remove('selected');
    } else if (selectedCauses.length < 3) {
      selectedCauses.push(val);
      tag.classList.add('selected');
    }
  });

  // step2 -> step3 (다음 버튼 대신, 살짝 아래 스크롤 후 넘어가는 넥스트 버튼 추가)
  const nextBtn = document.createElement('button');
  nextBtn.className = 'diary-save-btn';
  nextBtn.textContent = '다음';
  nextBtn.onclick = () => goToStep(3);
  document.getElementById('step2').appendChild(nextBtn);

  // ---- STEP 3: 텍스트 입력 ----
  const textInput = document.getElementById('textInput');
  const charCount = document.getElementById('charCount');
  textInput.addEventListener('input', () => { charCount.textContent = textInput.value.length; });

  document.getElementById('saveBtn').onclick = () => {
    const record = NTSDiary.addEntry({
      mood: selectedMood,
      causes: selectedCauses,
      text: textInput.value.trim()
    });
    trackEvent('diary_entry_created', { mood: record.mood, has_text: !!record.text, cause_count: record.causes.length });
    showToast();
    setTimeout(() => navigate('timeline.html'), 900);
  };

  function goToStep(n) {
    [1, 2, 3].forEach(i => { document.getElementById('step' + i).style.display = (i === n) ? 'block' : 'none'; });
    window.scrollTo({ top: 0, behavior: 'smooth' });
  }

  function showToast() {
    const toast = document.getElementById('toast');
    toast.classList.add('show');
    setTimeout(() => toast.classList.remove('show'), 1600);
  }
</script>
</body>
</html>
