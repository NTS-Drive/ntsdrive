<body>

  <a onclick="navigate('../post/index.html')"><span class="bicon"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="5" width="18" height="14" rx="1.5"/><path d="M3.5 6.5l8.5 6.5 8.5-6.5"/></svg></span>Post</a>
  <a class="active"><span class="bicon"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"><rect x="4" y="3" width="16" height="18" rx="1.5"/><line x1="8" y1="8" x2="16" y2="8"/><line x1="8" y1="12" x2="16" y2="12"/><line x1="8" y1="16" x2="12" y2="16"/></svg></span>Log</a>
  <a onclick="navigate('../diary/index.html')"><span class="bicon"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"><rect x="4" y="3" width="16" height="18" rx="1.5"/><line x1="8" y1="3" x2="8" y2="21"/><circle cx="16" cy="12" r="1.4" fill="currentColor" stroke="none"/></svg></span>Diary</a>
  <a onclick="navigate('../snap/index.html')"><span class="bicon"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"><rect x="4" y="4" width="16" height="13" rx="2"/><circle cx="12" cy="10.5" r="3.2"/><path d="M9 4l1.2-1.5h3.6L15 4"/></svg></span>Snap</a>

<div class="toast" id="toast"></div>

<script src="shared.js"></script>
<script>
const stage = document.getElementById('stage');

function renderCreate() {
  stage.innerHTML = `
    <div class="masthead">
      <div class="kicker">Log</div>
      <h1>마음을 모으는<br>방 만들기</h1>
      <div class="sub">친구들의 편지가 모여 목표를 채우면, 한 번에 열려요</div>
    </div>

    <div class="compose-paper">
      <div class="field">
        <label>방 제목 (대상자)</label>
        <input type="text" id="roomTitle" maxlength="30" placeholder="예: 지민이의 생일">
      </div>
      <div class="field">
        <label>디데이 (이 시간이 되면 자동으로 열려요)</label>
        <input type="datetime-local" id="roomDday">
      </div>
      <div class="field" style="margin-bottom:0;">
        <label>목표 글자 수 (100~1,000자)</label>
        <input type="number" id="roomGoal" min="${GOAL_MIN}" max="${GOAL_MAX}" step="10" value="300">
        <div class="field-hint">친구들이 쓴 편지 글자 수가 이 목표에 닿으면, 디데이 전이라도 바로 열려요.</div>
      </div>
    </div>

    <button class="seal-btn" onclick="handleCreate()">방 만들기</button>
    <div class="disclaimer">방 정보는 서버에 저장되지 않고, 생성되는 링크 안에만 담겨요.<br>친구용 링크를 잃어버리면 그 방은 다시 만들 수 없다는 점, 참고해주세요.</div>
  `;
}

function handleCreate() {
  const title = document.getElementById('roomTitle').value.trim();
  const ddayVal = document.getElementById('roomDday').value;
  let goal = parseInt(document.getElementById('roomGoal').value, 10);

  if (!title) { toast('방 제목을 입력해주세요.'); return; }
  if (!ddayVal) { toast('디데이를 설정해주세요.'); return; }
  const dday = new Date(ddayVal).getTime();
  if (isNaN(dday) || dday <= Date.now()) { toast('디데이는 현재보다 미래여야 해요.'); return; }
  if (isNaN(goal)) { toast('목표 글자 수를 입력해주세요.'); return; }
  goal = Math.min(GOAL_MAX, Math.max(GOAL_MIN, goal));

  const room = { title, dday, goal, createdAt: Date.now() };
  const roomEncoded = encodeData(room);
  const writeUrl = `${window.location.origin}${window.location.pathname.replace('create.html','write.html')}?room=${roomEncoded}`;
  const dashUrl = `${window.location.origin}${window.location.pathname.replace('create.html','index.html')}?room=${roomEncoded}`;

  autoRegisterToMylogs(roomEncoded, room);
  trackEvent('log_room_created', { room_title: title, goal_chars: goal });
  renderShareResult(writeUrl, dashUrl);
}

function autoRegisterToMylogs(roomEncoded, room) {
  const MYLOGS_KEY = 'log_mylogs_v1';
  let list = [];
  try {
    const raw = localStorage.getItem(MYLOGS_KEY);
    list = raw ? JSON.parse(raw) : [];
    if (!Array.isArray(list)) list = [];
  } catch (e) { list = []; }
  if (list.some(r => r.roomEncoded === roomEncoded)) return;
  list.unshift({ roomEncoded, title: room.title, dday: room.dday, goal: room.goal, addedAt: Date.now(), notified: false });
  try { localStorage.setItem(MYLOGS_KEY, JSON.stringify(list)); } catch (e) { /* storage full — non-fatal, share screen still works */ }
}

function renderShareResult(writeUrl, dashUrl) {
  stage.innerHTML = `
    <div class="share-result">
      <div class="env-icon">📖</div>
      <h2>방이 만들어졌어요</h2>
      <p>아래 링크를 친구들에게 전달해서 편지를 받아보세요.</p>
      <div class="link-box"><input type="text" readonly value="${writeUrl}"></div>
      <div class="share-actions">
        <button class="ghost-btn" style="flex:1;" onclick="copyLink('${writeUrl}')">친구용 링크 복사</button>
        <button class="ghost-btn" style="flex:1;" onclick="shareLink('${writeUrl}')">공유하기</button>
      </div>
      <div class="mylogs-howto">
        <div class="mylogs-howto-title">💡 친구가 쓴 편지 링크를 받으면?</div>
        <div class="mylogs-howto-steps">
          <span>📚 내 로그함</span><span>→</span><span>내가 만든 방</span><span>→</span><span>받은 링크 붙여넣기</span>
        </div>
        <p>이 방은 이미 <b>내 로그함</b>에 자동으로 등록해뒀어요. 우측 하단 버튼으로 언제든 찾아오실 수 있어요.</p>
      </div>
    </div>
  `;
}
function copyLink(url) {
  navigator.clipboard.writeText(url).then(() => toast('링크가 복사됐어요.')).catch(() => toast('복사에 실패했어요.'));
}
function shareLink(url) {
  if (navigator.share) {
    navigator.share({ title: 'Log — 마음을 모으는 방', url }).catch(() => {});
  } else {
    alert('이 브라우저는 공유하기를 지원하지 않아요. 대신 링크를 복사해드릴게요.');
    copyLink(url);
  }
}

renderCreate();
</script>
</body>
</html>
