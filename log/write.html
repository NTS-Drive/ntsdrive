<script>
const stage = document.getElementById('stage');
let room = null;
let roomEncodedRaw = null;
let letterSealed = false;

function hasUnsavedLetter() {
  if (letterSealed) return false;
  const el = document.getElementById('letterText');
  return !!(el && el.value.trim().length > 0);
}

// GNB(상단/하단) 링크는 전부 navigate()를 거치므로, 이 페이지 안에서만
// navigate()를 감싸서 작성 중인 내용이 있으면 한 번 더 확인한다.
// shared.js의 navigate() 자체는 건드리지 않고 이 페이지 스코프에서만 덮어씀.
const _originalNavigate = navigate;
navigate = function (url) {
  if (hasUnsavedLetter() && !confirm('작성 중인 내용이 있어요. 그래도 나가시겠어요?')) {
    return;
  }
  _originalNavigate(url);
};

// 새로고침, 탭 닫기, 뒤로가기 등 navigate()를 거치지 않는 이탈도 방지
window.addEventListener('beforeunload', (e) => {
  if (hasUnsavedLetter()) {
    e.preventDefault();
    e.returnValue = '';
  }
});

function init() {
  const params = new URLSearchParams(window.location.search);
  if (!params.has('room')) {
    stage.innerHTML = `<div class="share-result"><div class="env-icon">📖</div><h2>방 링크가 필요해요</h2><p>친구에게 받은 링크로 다시 접속해주세요.</p></div>`;
    return;
  }
  roomEncodedRaw = params.get('room');
  try {
    room = decodeData(roomEncodedRaw);
  } catch (e) {
    stage.innerHTML = `<div class="share-result"><div class="env-icon">📖</div><h2>링크를 읽을 수 없어요</h2><p>링크가 손상되었을 수 있어요.</p></div>`;
    return;
  }
  renderWrite();
}

function renderWrite() {
  stage.innerHTML = `
    <div class="masthead">
      <div class="kicker">Log</div>
      <h1>${escapeHtml(room.title)}</h1>
      <div class="sub">${formatDday(room.dday)}에 열리는 편지예요</div>
    </div>

    <div class="compose-paper">
      <div class="field">
        <label>보내는 사람 (선택)</label>
        <input type="text" id="fromName" maxlength="20" placeholder="예: 은우">
      </div>
      <div class="field" style="margin-bottom:0;">
        <label>편지 내용 (최대 ${LETTER_MAX_CHARS}자)</label>
        <textarea id="letterText" maxlength="${LETTER_MAX_CHARS}" placeholder="짧게, 마음을 담아 적어주세요" style="font-family:'NanumSonDahaeng',var(--font-serif);"></textarea>
        <div class="char-count" id="charCount">0 / ${LETTER_MAX_CHARS}</div>
      </div>
    </div>

    <button class="seal-btn" onclick="handleWrite()">편지 봉인하기</button>
    <div class="disclaimer">이 편지는 ${escapeHtml(room.title)} 방에 등록하면 글자 수만 먼저 반영되고,<br>내용은 디데이가 되거나 목표가 채워져야 볼 수 있어요.</div>
  `;
  const letterInput = document.getElementById('letterText');
  let isComposing = false;
  let alerted = false;
  letterInput.addEventListener('compositionstart', () => { isComposing = true; });
  letterInput.addEventListener('compositionend', () => { isComposing = false; enforceLetterLimit(letterInput, () => alerted, (v) => { alerted = v; }); });
  letterInput.addEventListener('input', () => {
    if (isComposing) { updateCharCount(); return; }
    enforceLetterLimit(letterInput, () => alerted, (v) => { alerted = v; });
  });
}

// 모바일 한글(IME) 조합 중에는 maxlength 속성이 무시되고 글자 수 제한을
// 넘겨 입력이 계속되는 브라우저 버그가 있어서, 조합 종료 시점에 한 번 더
// 강제로 잘라낸다 (Snap의 한 줄 메모와 동일한 방식).
function enforceLetterLimit(el, getAlerted, setAlerted) {
  if (el.value.length > LETTER_MAX_CHARS) {
    el.value = el.value.slice(0, LETTER_MAX_CHARS);
  }
  updateCharCount();
  if (el.value.length >= LETTER_MAX_CHARS) {
    if (!getAlerted()) { setAlerted(true); toast(`편지는 ${LETTER_MAX_CHARS}자 이내로 적어주세요.`); }
  } else {
    setAlerted(false);
  }
}

function updateCharCount() {
  const len = document.getElementById('letterText').value.length;
  const el = document.getElementById('charCount');
  el.textContent = `${len} / ${LETTER_MAX_CHARS}`;
  el.classList.toggle('over', len >= LETTER_MAX_CHARS);
}

function handleWrite() {
  const text = document.getElementById('letterText').value.trim();
  const from = document.getElementById('fromName').value.trim();
  if (!text) { toast('편지 내용을 적어주세요.'); return; }
  if (text.length > LETTER_MAX_CHARS) { toast(`편지는 ${LETTER_MAX_CHARS}자 이내로 적어주세요.`); return; }

  const letter = { title: room.title, dday: room.dday, goal: room.goal, text, from, createdAt: Date.now() };
  const encoded = encodeData(letter);
  const url = `${window.location.origin}${window.location.pathname.replace('write.html','index.html')}?room=${roomEncodedRaw}&add=${encoded}`;

  trackEvent('log_letter_written', { room_title: room.title, letter_length: text.length });
  letterSealed = true;
  renderShareResult(url);
}

function renderShareResult(url) {
  // 이 화면은 Log 전체에서 가장 중요한 전환 지점(여기서 이탈하면 편지가
  // 마스터에게 영영 전달 안 됨)이라, 다른 곳으로 샐 수 있는 요소를 전부
  // 숨기고 "보내기" 하나에만 집중하게 만든다.
  const topbarEl = document.getElementById('topbar');
  const bottomNavEl = document.getElementById('bottomNav');
  if (topbarEl) topbarEl.style.display = 'none';
  if (bottomNavEl) bottomNavEl.style.display = 'none';
  document.body.style.paddingBottom = '0';

  stage.innerHTML = `
    <div class="share-result">
      <div class="step-indicator">📮 마지막 한 단계 남았어요</div>
      <div class="env-icon">✉️</div>
      <h2>아직 편지가 도착 안 했어요!</h2>
      <p>지금 이 링크를 <b>${escapeHtml(room.title)}</b> 방주인에게 보내야<br>편지가 진짜로 전달돼요.<br>여기서 그냥 나가면 편지는 나만 가지고 있는 셈이에요.</p>
      <button class="seal-btn" style="margin-bottom:10px;" onclick="shareLink('${url}')">지금 바로 보내기</button>
      <button class="ghost-btn" style="width:100%; margin-bottom:16px;" onclick="copyLink('${url}')">링크만 복사하기</button>
      <div class="link-box"><input type="text" id="shareUrl" readonly value="${url}"></div>
    </div>
  `;
  // 편지 작성 직후 바로 공유 시트를 띄워서, 사용자가 버튼을 한 번 더
  // 누르지 않아도 "보내는 행동"까지 이어지도록 유도한다. navigator.share()는
  // 브라우저 정책상 사용자 제스처(클릭) 체인 안에서 동기적으로 호출되어야
  // 동작하므로 setTimeout 없이 바로 호출한다. 지원 안 하는 환경(대부분의
  // PC 브라우저)에서는 조용히 무시되고 버튼으로 대체된다.
  if (navigator.share) {
    shareLink(url);
  }
}
function copyLink(url) {
  navigator.clipboard.writeText(url).then(() => toast('링크가 복사됐어요.')).catch(() => toast('복사에 실패했어요.'));
}
function shareLink(url) {
  if (navigator.share) {
    navigator.share({ title: 'Log — 편지가 준비됐어요', url }).catch(() => {});
  } else {
    alert('이 브라우저는 공유하기를 지원하지 않아요. 대신 링크를 복사해드릴게요.');
    copyLink(url);
  }
}

init();
</script>
