<script>
const stage = document.getElementById('stage');
let currentRoom = null;
let roomEncoded = null;
let revealTimerId = null;

function storageKey(re) { return `log_room:${re}`; }

function loadLetters(re) {
  try {
    const raw = localStorage.getItem(storageKey(re));
    const list = raw ? JSON.parse(raw) : [];
    return Array.isArray(list) ? list : [];
  } catch (e) { return []; }
}
function saveLetters(re, list) {
  try { localStorage.setItem(storageKey(re), JSON.stringify(list)); }
  catch (e) { toast('저장 공간이 부족해서 목록을 저장하지 못했어요.'); }
}

function init() {
  const params = new URLSearchParams(window.location.search);

  if (params.has('reveal')) {
    try {
      renderRevealShared(decodeData(params.get('reveal')));
    } catch (e) {
      stage.innerHTML = `<div class="share-result"><div class="env-icon">📖</div><h2>링크를 읽을 수 없어요</h2><p>링크가 손상되었을 수 있어요.</p></div>`;
    }
    return;
  }

  if (!params.has('room') && !params.has('add')) {
    renderIntro();
    return;
  }

  // A friend's letter link (?add=...) embeds the room's own fields, so it
  // can double as a way into the right dashboard even without a separate
  // ?room= param.
  let re = params.get('room');
  if (!re && params.has('add')) {
    try {
      const letter = decodeData(params.get('add'));
      re = encodeData({ title: letter.title, dday: letter.dday, goal: letter.goal, createdAt: letter.createdAt });
    } catch (e) { /* fall through to error below */ }
  }

  if (!re) {
    stage.innerHTML = `<div class="share-result"><div class="env-icon">📖</div><h2>방 링크가 필요해요</h2><p>방 만들기 화면에서 받은 링크로 접속해주세요.</p></div>`;
    return;
  }

  try {
    currentRoom = decodeData(re);
  } catch (e) {
    stage.innerHTML = `<div class="share-result"><div class="env-icon">📖</div><h2>링크를 읽을 수 없어요</h2><p>링크가 손상되었을 수 있어요.</p></div>`;
    return;
  }
  roomEncoded = re;

  // If we arrived via a friend's ?add= link, try to auto-register it now.
  if (params.has('add')) {
    tryRegister(params.get('add'), true);
    // clean the URL so refreshing doesn't re-attempt the same add
    const clean = `${window.location.pathname}?room=${roomEncoded}`;
    window.history.replaceState({}, '', clean);
    renderReplyReceived(roomEncoded);
    return;
  }

  renderDashboard();
}

function isRoomOwner(re) {
  try {
    const raw = localStorage.getItem('log_mylogs_v1');
    const list = raw ? JSON.parse(raw) : [];
    return Array.isArray(list) && list.some(r => r.roomEncoded === re);
  } catch (e) { return false; }
}

// 친구의 회신 링크(?add=)로 들어왔을 때 뜨는 화면. 방 전체 진행 상황(대시보드)은
// 이 화면과 무관하게 그대로 보존되며, 여기서는 "이 회신 한 통"에 대한 안내만
// 보여준다. 방 주인인지 여부로만 추가 버튼 노출을 결정하고, 인앱 브라우저인지는
// 여기서 신경 쓰지 않는다(상단 배너/인터스티셜이 이미 별도로 안내하고 있음).
function renderReplyReceived(re) {
  const owner = isRoomOwner(re);
  trackEvent('log_reply_screen_shown', { is_owner: owner });
  const roomUrl = `${window.location.origin}${window.location.pathname}?room=${re}`;
  const ownerActions = owner ? `
    <div class="share-actions" style="margin-top:22px;">
      <button class="seal-btn" style="width:auto; flex:1;" onclick="trackEvent('log_reply_goto_room_click'); handleGoToRoomClick('${re}')">내 방으로 이동하기</button>
      <button class="ghost-btn" style="width:auto; flex:1;" onclick="trackEvent('log_reply_copy_click'); copyRoomLink('${roomUrl}')">방 링크 복사하기</button>
    </div>` : '';
  stage.innerHTML = `
    <div class="share-result">
      <div class="env-icon">✉️</div>
      <h2>마음이 잘 전달됐어요</h2>
      <p>방을 만든 사람이 "내 로그함"에 등록하고,<br>목표가 달성되거나 D-day가 되면 내용을 확인할 수 있어요.</p>
      ${ownerActions}
    </div>`;
}
function copyRoomLink(url) {
  navigator.clipboard.writeText(url)
    .then(() => toast('방 링크가 복사됐어요.'))
    .catch(() => toast('복사에 실패했어요.'));
}
function handleGoToRoomClick(re) {
  const url = `index.html?room=${re}`;
  if (typeof window !== 'undefined' && window.NTSInAppBrowser && typeof window.ntsSmartNavigate === 'function') {
    window.ntsSmartNavigate(url);
  } else {
    navigate(url);
  }
}

/* ===== Intro (no room yet) — 방 만들기 폼을 바로 포함 ===== */
function renderIntro() {
  stage.innerHTML = `
    <div class="masthead">
      <div class="kicker">Log</div>
      <h1>여러 마음이 모여<br>쌓이는 곳</h1>
      <div class="sub">친구들의 편지가 모여 목표를 채우면,<br>한 번에 열려요</div>
    </div>

    <div class="intro-steps">
      <div class="step"><div class="num">1</div><p>대상자와 D-day, 목표 글자 수를 정해 방을 만들어요.</p></div>
      <div class="step"><div class="num">2</div><p>친구용 링크를 전달하면, 친구들이 각자 짧은 편지를 써요.</p></div>
      <div class="step"><div class="num">3</div><p>받은 편지 링크를 내 방에 등록하면 글자 수가 쌓여요. 목표를 채우거나 D-day가 되면 한 번에 열려요.</p></div>
    </div>

    <div class="compose-paper">
      <div class="field">
        <label>방 제목 (대상자)</label>
        <input type="text" id="roomTitle" maxlength="30" placeholder="예: 지민이의 생일">
      </div>
      <div class="field">
        <label>D-day (이 시간이 되면 자동으로 열려요)</label>
        <div class="preset-row" id="ddayPresetRow"></div>
        <input type="datetime-local" id="roomDday" style="display:none;">
      </div>
      <div class="field" style="margin-bottom:0;">
        <label>목표 글자 수 (100~1,000자)</label>
        <div class="preset-row" id="goalPresetRow"></div>
        <input type="number" id="roomGoal" min="${GOAL_MIN}" max="${GOAL_MAX}" step="10" value="300">
        <div class="field-hint">친구들이 쓴 편지 글자 수가 이 목표에 닿으면, D-day 전이라도 바로 열려요.</div>
      </div>
    </div>

    <button class="seal-btn" id="createRoomBtn" onclick="handleCreateClick()" disabled>방 만들기</button>
    <div class="disclaimer">방 정보는 서버에 저장되지 않고, 생성되는 링크 안에만 담겨요.<br>링크가 내용을 읽는 열쇠이니 안전하게 보관해 주세요.</div>
  `;
  renderDdayPresetRow();
  applyDdayPreset(selectedDdayPreset);
  renderGoalPresetRow();
  document.getElementById('roomTitle').addEventListener('input', updateCreateBtnState);
  if (!document.querySelector('.inbox-fab')) {
    const fab = document.createElement('a');
    fab.className = 'inbox-fab';
    fab.innerHTML = '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"><rect x="4" y="3" width="16" height="18" rx="1.5"/><line x1="8" y1="8" x2="16" y2="8"/><line x1="8" y1="12" x2="16" y2="12"/><line x1="8" y1="16" x2="12" y2="16"/></svg>내 로그함';
    fab.onclick = () => navigate('mylogs.html');
    document.body.appendChild(fab);
  } else {
    document.querySelector('.inbox-fab').style.display = '';
  }
}

let selectedDdayPreset = 'tomorrow9';
function renderDdayPresetRow() {
  const presets = [
    { key: '1h', label: '1시간 후' },
    { key: 'midnight', label: '오늘밤 12시' },
    { key: 'tomorrow9', label: '내일 아침 9시' },
    { key: 'month1', label: '한 달 후' },
    { key: 'day100', label: '100일 후' },
    { key: 'custom', label: '직접입력' }
  ];
  document.getElementById('ddayPresetRow').innerHTML = presets.map(p => `
    <button type="button" class="preset-btn ${selectedDdayPreset === p.key ? 'selected' : ''}" onclick="applyDdayPreset('${p.key}')">${p.label}</button>
  `).join('');
  const ddayInput = document.getElementById('roomDday');
  if (ddayInput) ddayInput.style.display = selectedDdayPreset === 'custom' ? 'block' : 'none';
}
function getDdayPresetTime(key) {
  const now = new Date();
  switch (key) {
    case '1h': return Date.now() + 60 * 60 * 1000;
    case 'midnight': { const d = new Date(); d.setHours(24, 0, 0, 0); return d.getTime(); }
    case 'tomorrow9': { const d = new Date(); d.setDate(d.getDate() + 1); d.setHours(9, 0, 0, 0); return d.getTime(); }
    case 'month1': { const d = new Date(); d.setMonth(d.getMonth() + 1); return d.getTime(); }
    case 'day100': return Date.now() + 100 * 24 * 60 * 60 * 1000;
    default: return null;
  }
}
function applyDdayPreset(key) {
  selectedDdayPreset = key;
  if (key === 'custom') {
    renderDdayPresetRow();
    const ddayInput = document.getElementById('roomDday');
    if (ddayInput) ddayInput.focus();
    return;
  }
  const ms = getDdayPresetTime(key);
  const d = new Date(ms);
  const pad = n => String(n).padStart(2, '0');
  document.getElementById('roomDday').value = `${d.getFullYear()}-${pad(d.getMonth()+1)}-${pad(d.getDate())}T${pad(d.getHours())}:${pad(d.getMinutes())}`;
  renderDdayPresetRow();
}
document.addEventListener('change', (e) => {
  if (e.target && e.target.id === 'roomDday') { selectedDdayPreset = 'custom'; renderDdayPresetRow(); }
});

let selectedGoalPreset = 300;
function renderGoalPresetRow() {
  const presets = [100, 300, 500];
  document.getElementById('goalPresetRow').innerHTML = presets.map(g => `
    <button type="button" class="preset-btn ${selectedGoalPreset === g ? 'selected' : ''}" onclick="applyGoalPreset(${g})">${g}자</button>
  `).join('') + `<button type="button" class="preset-btn ${selectedGoalPreset === 'custom' ? 'selected' : ''}" onclick="applyGoalPreset('custom')">직접입력</button>`;
}
function applyGoalPreset(val) {
  selectedGoalPreset = val;
  if (val !== 'custom') document.getElementById('roomGoal').value = val;
  renderGoalPresetRow();
  if (val === 'custom') document.getElementById('roomGoal').focus();
}
document.addEventListener('input', (e) => {
  if (e.target && e.target.id === 'roomGoal') { selectedGoalPreset = 'custom'; renderGoalPresetRow(); }
});
function updateCreateBtnState() {
  const btn = document.getElementById('createRoomBtn');
  const title = document.getElementById('roomTitle');
  if (btn && title) btn.disabled = !title.value.trim();
}
function handleCreateClick() {
  if (typeof window !== 'undefined' && window.NTSInAppBrowser) {
    alert(`${window.NTSInAppBrowser.name} 안에서는 방이 저장되지 않아요. 주 사용 브라우저(사파리 또는 크롬)로 이동해서 방을 만들어주세요.`);
    trackEvent('log_room_create_blocked_inapp', { app: window.NTSInAppBrowser.id });
    return;
  }
  const title = document.getElementById('roomTitle').value.trim();
  const ddayVal = document.getElementById('roomDday').value;
  let goal = parseInt(document.getElementById('roomGoal').value, 10);

  if (!title) { toast('방 제목을 입력해주세요.'); return; }
  if (!ddayVal) { toast('D-day를 설정해주세요.'); return; }
  const dday = new Date(ddayVal).getTime();
  if (isNaN(dday) || dday <= Date.now()) { toast('D-day는 현재보다 미래여야 해요.'); return; }
  if (isNaN(goal)) { toast('목표 글자 수를 입력해주세요.'); return; }
  goal = Math.min(GOAL_MAX, Math.max(GOAL_MIN, goal));

  const room = { title, dday, goal, createdAt: Date.now() };
  const newRoomEncoded = encodeData(room);
  const writeUrl = `${window.location.origin}${window.location.pathname.replace('index.html', 'write.html')}?room=${newRoomEncoded}`;

  autoRegisterToMylogs(newRoomEncoded, room);
  trackEvent('log_room_created', { room_title: title, goal_chars: goal });
  renderCreateShareResult(writeUrl);
}

function autoRegisterToMylogs(re, room) {
  const MYLOGS_KEY = 'log_mylogs_v1';
  let list = [];
  try {
    const raw = localStorage.getItem(MYLOGS_KEY);
    list = raw ? JSON.parse(raw) : [];
    if (!Array.isArray(list)) list = [];
  } catch (e) { list = []; }
  if (list.some(r => r.roomEncoded === re)) return;
  list.unshift({ roomEncoded: re, title: room.title, dday: room.dday, goal: room.goal, addedAt: Date.now(), notified: false });
  try { localStorage.setItem(MYLOGS_KEY, JSON.stringify(list)); } catch (e) { /* storage full — non-fatal */ }
}

function renderCreateShareResult(writeUrl) {
  // 이 화면에서 마스터가 다음에 뭘 해야 할지 명확한 단일 경로(내 로그함)로
  // 안내하기 위해, 같은 목적지로 가는 플로팅 버튼은 잠시 숨긴다.
  const fab = document.querySelector('.inbox-fab');
  if (fab) fab.style.display = 'none';

  stage.innerHTML = `
    <div class="share-result">
      <div class="env-icon">📖</div>
      <h2>방이 만들어졌어요</h2>
      <p>아래 링크를 친구들에게 전달해서 편지를 받아보세요.</p>
      <button class="seal-btn" style="margin-bottom:10px;" onclick="shareLink('${writeUrl}')">지금 바로 공유하기</button>
      <button class="ghost-btn" style="width:100%; margin-bottom:16px;" onclick="copyLink('${writeUrl}')">링크만 복사하기</button>
      <div class="link-box"><input type="text" readonly value="${writeUrl}"></div>
      <div class="mylogs-howto">
        <div class="mylogs-howto-title">💡 친구가 쓴 편지 링크를 받으면?</div>
        <p>이 방은 이미 <b>내 로그함</b>에 자동으로 등록해뒀어요. 받은 링크를 내 로그함에서 붙여넣기만 하면, 어느 방인지 자동으로 알아서 등록돼요.</p>
      </div>
      <button class="ghost-btn" style="width:100%; margin-top:20px;" onclick="navigate('mylogs.html')">확인했어요, 내 로그함으로 갈게요</button>
    </div>
  `;
  // 참여자 화면과 동일한 패턴: 사용자 클릭 체인 안에서 동기적으로 호출해야
  // navigator.share()가 브라우저 정책에 막히지 않는다.
  if (navigator.share) {
    shareLink(writeUrl);
  }
}
function copyLink(url) {
  navigator.clipboard.writeText(url).then(() => toast('링크가 복사됐어요.')).catch(() => toast('복사에 실패했어요.'));
}
function shareLink(url) {
  if (navigator.share) {
    navigator.share({ url }).catch(() => {});
  } else {
    alert('이 브라우저는 공유하기를 지원하지 않아요. 대신 링크를 복사해드릴게요.');
    copyLink(url);
  }
}

/* ===== Dashboard ===== */
function renderDashboard() {
  const letters = loadLetters(roomEncoded);
  const total = letters.reduce((sum, l) => sum + l.text.length, 0);
  const isRevealed = Date.now() >= currentRoom.dday || total >= currentRoom.goal;

  if (isRevealed) {
    renderReveal(letters, total);
    return;
  }

  const remaining = Math.max(0, currentRoom.goal - total);
  const pct = Math.min(100, Math.round((total / currentRoom.goal) * 100));
  const writeUrl = `${window.location.origin}${window.location.pathname.replace('index.html', 'write.html')}?room=${roomEncoded}`;

  stage.innerHTML = `
    <div class="masthead" style="margin-bottom:24px;">
      <div class="kicker">Log</div>
    </div>
    <div class="room-title">${escapeHtml(currentRoom.title)}</div>
    <div class="room-dday">${formatDday(currentRoom.dday)}에 열리거나, 목표를 채우면 열려요</div>

    <div class="link-box"><input type="text" readonly value="${writeUrl}"></div>
    <button class="seal-btn" style="margin-bottom:10px;" onclick="shareLink('${writeUrl}')">공유하기</button>
    <button class="ghost-btn" style="width:100%; margin-bottom:24px;" onclick="copyLink('${writeUrl}')">친구용 링크 복사</button>

    <div class="gauge-wrap">
      <div class="gauge-count"><b>${total}</b> / ${currentRoom.goal}자</div>
      <div class="gauge-remain">앞으로 ${remaining}자가 더 모이면 열려요</div>
      <div class="gauge-bar-track"><div class="gauge-bar-fill" style="width:${pct}%;"></div></div>
      <div class="gauge-participants">지금까지 ${letters.length}명이 마음을 보탰어요</div>
    </div>

    <div class="disclaimer" style="margin-top:0; margin-bottom:24px;">받은 편지 링크는 <a onclick="navigate('mylogs.html')" class="inline-link">내 로그함</a>에서 등록해주세요.</div>

    <div id="letterList"></div>

    <div class="disclaimer">이 방의 진행 상황은 지금 사용 중인 브라우저에만 저장돼요. 놓치지 않으려면 <a href="https://ntsdrive.com/settings/index.html" style="color:#C17F2A; text-decoration:underline;">주기적으로 백업</a>을 해주세요.</div>
  `;
  renderLetterList(letters);
  if (!document.querySelector('.inbox-fab')) {
    const fab = document.createElement('a');
    fab.className = 'inbox-fab';
    fab.innerHTML = '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"><rect x="4" y="3" width="16" height="18" rx="1.5"/><line x1="8" y1="8" x2="16" y2="8"/><line x1="8" y1="12" x2="16" y2="12"/><line x1="8" y1="16" x2="12" y2="16"/></svg>내 로그함';
    fab.onclick = () => navigate('mylogs.html');
    document.body.appendChild(fab);
  }

  clearInterval(revealTimerId);
  revealTimerId = setInterval(() => {
    const l = loadLetters(roomEncoded);
    const t = l.reduce((s, x) => s + x.text.length, 0);
    if (Date.now() >= currentRoom.dday || t >= currentRoom.goal) {
      clearInterval(revealTimerId);
      renderDashboard();
    }
  }, 15000);
}

function renderLetterList(letters) {
  const container = document.getElementById('letterList');
  if (!container) return;
  if (letters.length === 0) {
    container.innerHTML = `<div class="inbox-empty">아직 등록된 편지가 없어요.<br>친구에게 받은 링크를 위에 붙여넣어보세요.</div>`;
    return;
  }
  container.innerHTML = letters.map((l, i) => `
    <div class="inbox-card">
      <div class="inbox-card-icon">✉️</div>
      <div class="inbox-card-body">
        <div class="inbox-card-title">${l.from ? escapeHtml(l.from) : `편지 ${i + 1}`}</div>
        <div class="inbox-card-len">${l.text.length}자 · 아직 잠겨있어요</div>
      </div>
    </div>
  `).join('');
}

function tryRegister(encoded, silent) {
  let letter;
  try {
    letter = decodeData(encoded);
  } catch (e) {
    if (!silent) toast('편지 링크를 읽을 수 없어요.');
    return;
  }

  // Must belong to this room
  if (letter.title !== currentRoom.title || letter.dday !== currentRoom.dday || letter.goal !== currentRoom.goal) {
    if (!silent) toast('이 방의 편지가 아니에요.');
    return;
  }

  const letters = loadLetters(roomEncoded);
  if (letters.some(l => l.text === letter.text && l.createdAt === letter.createdAt)) {
    if (!silent) toast('이미 등록된 편지예요.');
    return;
  }

  const total = letters.reduce((sum, l) => sum + l.text.length, 0);

  letters.push({ text: letter.text, from: letter.from || '', createdAt: letter.createdAt });
  saveLetters(roomEncoded, letters);
  const newTotal = total + letter.text.length;

  trackEvent('log_letter_registered', {
    room_title: currentRoom.title,
    letter_length: letter.text.length,
    current_total_chars: newTotal
  });

  if (!silent) toast('편지가 등록됐어요.');
  renderDashboard();
}

/* ===== Reveal: cards flip open one by one ===== */
function renderReveal(letters, total) {
  clearInterval(revealTimerId);
  trackEvent('log_room_revealed', {
    room_title: currentRoom.title, letter_count: letters.length, total_chars: total
  });

  if (letters.length === 0) {
    stage.innerHTML = `
      <div class="reveal-burst">
        <div class="burst-icon">🌱</div>
        <h2>${escapeHtml(currentRoom.title)}</h2>
        <p>아직 아무도 마음을 보태지 않은 채 방이 닫혔어요.</p>
      </div>
      <div class="disclaimer" style="margin-bottom:22px;">다른 주제로 한 번 더 해볼까요?</div>
      <div class="share-actions">
        <button class="seal-btn" style="width:auto; flex:1;" onclick="navigate('index.html')">다른 주제로 방 다시 만들기</button>
      </div>
    `;
    return;
  }

  stage.innerHTML = `
    <div class="reveal-burst" id="revealCapture">
      <div class="burst-icon">🎉</div>
      <h2>${escapeHtml(currentRoom.title)}</h2>
      <p>${letters.length}명이 보낸 ${total}자의 마음이 도착했어요</p>
    </div>
    <div class="reveal-grid" id="revealGrid">
      ${letters.map((l, i) => `
        <div class="reveal-card" id="rcard${i}">
          <div class="reveal-card-inner">
            <div class="reveal-card-face reveal-card-back">✉️</div>
            <div class="reveal-card-face reveal-card-front">
              <div class="letter-text">${escapeHtml(l.text)}</div>
              <div class="letter-meta">${l.from ? escapeHtml(l.from) : '익명'}</div>
            </div>
          </div>
        </div>
      `).join('')}
    </div>
    <div class="share-actions" style="margin-top:26px;">
      <button class="ghost-btn" style="flex:1;" onclick="saveRoomImage()">저장하기</button>
      <button class="ghost-btn" style="flex:1;" onclick="shareRevealedRoom()">공유하기</button>
    </div>
  `;

  // Each card's front face is absolutely positioned (required for the 3D
  // flip), which means the card's box doesn't naturally grow to fit long
  // messages — it was clipping at a fixed min-height. Measure each
  // message's real rendered height via an offscreen clone at the card's
  // actual width, then size the card to fit before the flip plays.
  letters.forEach((l, i) => {
    const card = document.getElementById(`rcard${i}`);
    const inner = card.querySelector('.reveal-card-inner');
    const h = measureLetterCardHeight(card.offsetWidth, l.text, l.from);
    inner.style.minHeight = h + 'px';
    setTimeout(() => card.classList.add('flipped'), 300 + i * 220);
  });
}

function measureLetterCardHeight(width, text, from) {
  const clone = document.createElement('div');
  clone.style.cssText = `position:absolute; left:-9999px; top:0; visibility:hidden; width:${width}px;
    box-sizing:border-box; padding:18px 20px; font-family:var(--font-serif); font-size:14.5px; line-height:1.7;`;
  const textDiv = document.createElement('div');
  textDiv.textContent = text;
  clone.appendChild(textDiv);
  const metaDiv = document.createElement('div');
  metaDiv.style.cssText = 'font-size:10.5px; margin-top:4px;';
  metaDiv.textContent = from || '익명';
  clone.appendChild(metaDiv);
  document.body.appendChild(clone);
  const h = clone.offsetHeight;
  document.body.removeChild(clone);
  return Math.max(90, h);
}

function shareRevealedRoom() {
  const letters = loadLetters(roomEncoded);
  const payload = {
    title: currentRoom.title,
    letters: letters.map(l => ({ text: l.text, from: l.from || '' }))
  };
  const encoded = encodeData(payload);
  const url = `${window.location.origin}${window.location.pathname}?reveal=${encoded}`;
  if (navigator.share) {
    navigator.share({ url }).catch(() => {});
  } else {
    navigator.clipboard.writeText(url).then(() => toast('공개된 방을 볼 수 있는 링크가 복사됐어요.')).catch(() => toast('복사에 실패했어요.'));
  }
}

function renderRevealShared(payload) {
  const letters = payload.letters;
  const total = letters.reduce((s, l) => s + l.text.length, 0);
  trackEvent('log_room_revealed_shared', { room_title: payload.title, letter_count: letters.length });
  stage.innerHTML = `
    <div class="reveal-burst" id="revealCapture">
      <div class="burst-icon">🎉</div>
      <h2>${escapeHtml(payload.title)}</h2>
      <p>${letters.length}명이 보낸 ${total}자의 마음이 도착했어요</p>
    </div>
    <div class="reveal-grid" id="revealGrid">
      ${letters.map((l, i) => `
        <div class="reveal-card flipped" id="rcard${i}">
          <div class="reveal-card-inner">
            <div class="reveal-card-face reveal-card-back">✉️</div>
            <div class="reveal-card-face reveal-card-front">
              <div class="letter-text">${escapeHtml(l.text)}</div>
              <div class="letter-meta">${l.from ? escapeHtml(l.from) : '익명'}</div>
            </div>
          </div>
        </div>
      `).join('')}
    </div>
    <div class="share-actions" style="margin-top:26px;">
      <button class="ghost-btn" style="flex:1;" onclick="navigate('index.html')">나도 방 만들어보기</button>
    </div>
  `;
  letters.forEach((l, i) => {
    const card = document.getElementById(`rcard${i}`);
    const inner = card.querySelector('.reveal-card-inner');
    inner.style.minHeight = measureLetterCardHeight(card.offsetWidth, l.text, l.from) + 'px';
  });
}

function saveRoomImage() {
  // Flip every card face-up first so the saved image shows the actual
  // letters, not the still-mid-animation/back-facing state.
  document.querySelectorAll('.reveal-card').forEach(c => c.classList.add('flipped'));
  setTimeout(() => {
    const list = document.getElementById('revealGrid');
    const capture = document.createElement('div');
    capture.style.background = '#FBF6EC';
    capture.style.padding = '20px';
    capture.appendChild(document.getElementById('revealCapture').cloneNode(true));
    capture.appendChild(list.cloneNode(true));
    document.body.appendChild(capture);
    if (typeof html2canvas === 'undefined') { toast('저장 기능을 불러오지 못했어요.'); document.body.removeChild(capture); return; }
    html2canvas(capture, { backgroundColor: '#FBF6EC', scale: 2 }).then(canvas => {
      const link = document.createElement('a');
      link.download = `${currentRoom.title}_${Date.now()}.png`;
      link.href = canvas.toDataURL('image/png');
      link.click();
      toast('이미지가 저장됐어요.');
      document.body.removeChild(capture);
    }).catch(() => { toast('저장에 실패했어요.'); document.body.removeChild(capture); });
  }, 100);
}

init();
</script>
