<script src="../camera/shared.js?v=1784107173"></script>
<script>
const stage = document.getElementById('stage');
let capturedCanvas = null;
let currentFacing = 'environment';

function renderViewfinder() {
  const albumLinkEl = document.getElementById('camAlbumLink');
  if (albumLinkEl) albumLinkEl.style.display = '';
  stage.innerHTML = `
    <div class="cam-kicker snap">Snap</div>
    <div class="cam-title">즉석사진 찍기</div>
    <div class="cam-sub">찍자마자 바로 볼 수 있어요 · 흰 테두리에 짧은 글도 남길 수 있어요</div>
    <div class="cam-howto-steps sr-only">
      <div class="step"><div class="num">1</div><p>셔터를 눌러 지금 이 순간을 찍어요.</p></div>
      <div class="step"><div class="num">2</div><p>흰 테두리에 한 줄 메모를 남겨요 (선택 사항이에요).</p></div>
      <div class="step"><div class="num">3</div><p>내 사진첩에 저장해두고 언제든 다시 꺼내봐요.</p></div>
    </div>
    <div class="viewfinder ratio-square"><video id="video" autoplay playsinline muted></video></div>
    <div class="shutter-row">
      <span style="width:44px;"></span>
      <button class="shutter-btn" onclick="handleShutter()"></button>
      <button class="cam-flip-btn" onclick="toggleFacing()" title="카메라 전환"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"><path d="M17 3l3 3-3 3"/><path d="M20 6H9a5 5 0 0 0-5 5"/><path d="M7 21l-3-3 3-3"/><path d="M4 18h11a5 5 0 0 0 5-5"/></svg></button>
    </div>
    <div class="cam-notice">
      사진은 이 브라우저에만 저장돼요. 저장 공간에 따라 최대 2주·24컷보다 일찍 삭제될 수 있으니,
      아끼는 사진은 <a onclick="navigate('../album/index.html')">내 사진첩</a>에서 미리 다운로드해두세요.
    </div>
  `;
  const video = document.getElementById('video');
  video.classList.toggle('mirror', currentFacing === 'user');
  openCamera(video, currentFacing);
}

function toggleFacing() {
  currentFacing = currentFacing === 'environment' ? 'user' : 'environment';
  const video = document.getElementById('video');
  if (video && video.srcObject) stopCamera(video);
  video.classList.toggle('mirror', currentFacing === 'user');
  openCamera(video, currentFacing);
}

function handleShutter() {
  const video = document.getElementById('video');
  if (!video.videoWidth) { toast('카메라를 준비 중이에요, 잠시만요.'); return; }
  capturedCanvas = captureFrame(video, 1); // 1:1 square, Instax-square style
  stopCamera(video);
  const framed = applySnapFilter(capturedCanvas);
  renderPreview(framed);
}

let previewDataUrl = null;
let previewCanvas = null;

function renderPreview(framedCanvas) {
  previewCanvas = framedCanvas;
  previewDataUrl = framedCanvas.toDataURL('image/jpeg', JPEG_QUALITY);
  // 저장하기 버튼이랑 겹쳐서 실수로 저장 없이 사진첩으로 새버리는 걸
  // 막기 위해, 저장 확인 전(미리보기 단계)에서만 플로팅 버튼을 숨긴다.
  const albumLinkEl = document.getElementById('camAlbumLink');
  if (albumLinkEl) albumLinkEl.style.display = 'none';
  stage.innerHTML = `
    <div class="cam-kicker snap">Snap</div>
    <div class="cam-title">이 사진 어때요?</div>
    <div class="viewfinder ratio-square" style="aspect-ratio:${framedCanvas.width}/${framedCanvas.height};">
      <img src="${previewDataUrl}" style="width:100%; height:100%; object-fit:contain; background:#000;">
    </div>
    <div class="cam-field">
      <label class="date-check-row">날짜 넣기 <input type="checkbox" id="dateCheck"></label>
      <label>한 줄 메모 (선택, 최대 20자)</label>
      <input type="text" id="captionInput" maxlength="20" placeholder="이 순간을 짧게 남겨보세요" style="font-family:'NanumSonDahaeng',sans-serif; font-size:16px;">
      <div class="char-count-row"><span id="capCharCount">0</span>/20</div>
    </div>
    <div class="cam-result-actions">
      <button class="cam-btn" onclick="renderViewfinder()">다시 찍기</button>
      <button class="cam-btn primary" onclick="handleSave()">저장하기</button>
    </div>
  `;
  const capInput = document.getElementById('captionInput');
  const capCount = document.getElementById('capCharCount');
  let alerted = false;
  let isComposing = false;

  function enforceCaptionLimit() {
    if (capInput.value.length > 20) {
      capInput.value = capInput.value.slice(0, 20);
    }
    capCount.textContent = capInput.value.length;
    if (capInput.value.length >= 20) {
      capCount.classList.add('limit');
      if (!alerted) { alerted = true; toast('한 줄 메모는 최대 20자까지만 남길 수 있어요.'); }
    } else {
      capCount.classList.remove('limit');
      alerted = false;
    }
  }

  // 모바일 한글(IME) 입력 중에는 maxlength 속성이 무시되고 20자를 넘겨
  // 입력이 계속되는 브라우저 버그가 있어서, 조합 종료 시점(compositionend)에
  // 한 번 더 강제로 잘라낸다. 조합 중(isComposing)에는 글자수만 표시하고
  // 값을 억지로 자르지 않아 조합 중인 글자가 깨지는 걸 방지한다.
  capInput.addEventListener('compositionstart', () => { isComposing = true; });
  capInput.addEventListener('compositionend', () => { isComposing = false; enforceCaptionLimit(); });
  capInput.addEventListener('input', () => {
    if (isComposing) { capCount.textContent = capInput.value.length; return; }
    enforceCaptionLimit();
  });
}

function handleSave() {
  const caption = document.getElementById('captionInput').value.trim();
  const wantsDate = document.getElementById('dateCheck').checked;
  if (!caption && !wantsDate) {
    finalizeSave(previewDataUrl, caption);
    return;
  }
  // Draw the caption directly onto the ORIGINAL (uncompressed) framed
  // canvas — not onto a reloaded copy of the already-JPEG-compressed
  // preview. Re-encoding a JPEG a second time compounds compression
  // artifacts especially badly around thin handwriting-font strokes,
  // which is what was making the caption look "broken"/glitchy. Drawing
  // on the untouched canvas and exporting to JPEG exactly once avoids
  // that entirely.
  const canvas = document.createElement('canvas');
  canvas.width = previewCanvas.width; canvas.height = previewCanvas.height;
  const ctx = canvas.getContext('2d');
  ctx.drawImage(previewCanvas, 0, 0);

  const border = Math.round(canvas.width * 0.05);
  const capturedSize = canvas.width / 1.10;
  const bottomBorder = capturedSize * 0.32;
  const capY = border + capturedSize + bottomBorder / 2;

  function drawDateIfNeeded() {
    if (!wantsDate) return;
    const now = new Date();
    const dateStr = `${now.getFullYear()}.${String(now.getMonth() + 1).padStart(2, '0')}.${String(now.getDate()).padStart(2, '0')}`;
    ctx.font = `500 ${Math.round(canvas.width * 0.028)}px Pretendard, sans-serif`;
    ctx.fillStyle = '#948C7C';
    ctx.textAlign = 'right';
    ctx.textBaseline = 'bottom';
    ctx.fillText(dateStr, canvas.width - border - canvas.width * 0.015, border + capturedSize + bottomBorder - bottomBorder * 0.14);
  }

  if (!caption) {
    drawDateIfNeeded();
    finalizeSave(canvas.toDataURL('image/jpeg', JPEG_QUALITY), caption);
    return;
  }

  document.fonts.load('400 40px NanumSonDahaeng').then(() => {
    const fontSize = Math.round(canvas.width * 0.062);
    ctx.font = `400 ${fontSize}px NanumSonDahaeng, sans-serif`;
    ctx.fillStyle = '#3A342A';
    ctx.textBaseline = 'middle';
    ctx.textAlign = 'center';

    ctx.save();
    ctx.translate(canvas.width / 2, capY);
    ctx.rotate(-0.02);
    ctx.fillText(caption, 0, 0);
    ctx.restore();

    drawDateIfNeeded();
    finalizeSave(canvas.toDataURL('image/jpeg', JPEG_QUALITY), caption);
  });
}

let savedDataUrl = null;
function finalizeSave(dataUrl, caption) {
  const photo = { id: makeId(), type: 'snap', dataUrl, caption, createdAt: Date.now() };
  const ok = addPhoto(photo);
  if (ok) {
    savedDataUrl = dataUrl;
    trackEvent('snap_photo_saved', { has_caption: !!caption, facing: currentFacing });
    renderSaved();
  }
}

function renderSaved() {
  const albumLinkEl = document.getElementById('camAlbumLink');
  if (albumLinkEl) albumLinkEl.style.display = '';
  stage.innerHTML = `
    <div class="cam-kicker snap">Snap</div>
    <div class="cam-title">저장됐어요</div>
    <div class="cam-sub">내 사진첩에서 언제든 다시 볼 수 있어요</div>
    <div class="cam-result-actions">
      <button class="cam-btn" onclick="renderViewfinder()">한 장 더 찍기</button>
      <button class="cam-btn" onclick="sharePhoto(savedDataUrl, 'snap_'+Date.now()+'.jpg', 'Snap')">공유하기</button>
    </div>
    <div class="cam-result-actions" style="margin-top:10px;">
      <button class="cam-btn primary" onclick="navigate('../album/index.html')">내 사진첩 보기</button>
    </div>
  `;
}

renderViewfinder();
</script>
