<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <clipPath id="squircleClipV">
      <rect x="0" y="0" width="512" height="512" rx="114"/>
    </clipPath>
    <linearGradient id="vividBlueBg" x1="10%" y1="0%" x2="90%" y2="100%">
      <stop offset="0%" stop-color="#3D9BFF"/>
      <stop offset="55%" stop-color="#0071E3"/>
      <stop offset="100%" stop-color="#0052A8"/>
    </linearGradient>
    <linearGradient id="glassFillV" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#FFFFFF" stop-opacity="0.60"/>
      <stop offset="100%" stop-color="#FFFFFF" stop-opacity="0.22"/>
    </linearGradient>
    <filter id="glassShadowV" x="-50%" y="-50%" width="200%" height="200%">
      <feDropShadow dx="0" dy="14" stdDeviation="16" flood-color="#00295C" flood-opacity="0.35"/>
    </filter>
    <filter id="highlightBlurV" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="10"/>
    </filter>
  </defs>

  <!-- Background: vivid brand blue -->
  <g clip-path="url(#squircleClipV)">
    <rect x="0" y="0" width="512" height="512" fill="url(#vividBlueBg)"/>
  </g>

  <!-- Liquid glass folder, mathematically centered: shape bbox center (272,273) -> canvas center (256,256) -->
  <g transform="translate(-97.6 -98.9) scale(1.3)">
    <g filter="url(#glassShadowV)">
      <path d="M156 196
               a20 20 0 0 1 20 -20
               h60
               l24 26
               h108
               a20 20 0 0 1 20 20
               v128
               a20 20 0 0 1 -20 20
               h-192
               a20 20 0 0 1 -20 -20
               z"
            fill="url(#glassFillV)" stroke="#FFFFFF" stroke-opacity="0.65" stroke-width="2.5"/>
    </g>
    <ellipse cx="220" cy="220" rx="70" ry="18" fill="#FFFFFF" opacity="0.6" filter="url(#highlightBlurV)" transform="rotate(-18 220 220)"/>
  </g>
</svg>
