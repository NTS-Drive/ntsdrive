<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <clipPath id="squircleClip3">
      <rect x="0" y="0" width="512" height="512" rx="114"/>
    </clipPath>
    <radialGradient id="purpleGlowLogo3" cx="15%" cy="12%" r="80%">
      <stop offset="0%" stop-color="#9B8FEA" stop-opacity="0.55"/>
      <stop offset="55%" stop-color="#B9AEF0" stop-opacity="0.32"/>
      <stop offset="100%" stop-color="#B9AEF0" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="blueGlowLogo3" cx="20%" cy="88%" r="70%">
      <stop offset="0%" stop-color="#BFE0F5"/>
      <stop offset="60%" stop-color="#BFE0F5" stop-opacity="0.5"/>
      <stop offset="100%" stop-color="#BFE0F5" stop-opacity="0"/>
    </radialGradient>

    <!-- Glass body gradient -->
    <linearGradient id="glassFill" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#FFFFFF" stop-opacity="0.55"/>
      <stop offset="100%" stop-color="#FFFFFF" stop-opacity="0.18"/>
    </linearGradient>

    <!-- Soft drop shadow for the glass folder -->
    <filter id="glassShadow" x="-50%" y="-50%" width="200%" height="200%">
      <feDropShadow dx="0" dy="14" stdDeviation="18" flood-color="#2A2560" flood-opacity="0.28"/>
    </filter>

    <!-- Blur for the glossy highlight -->
    <filter id="highlightBlur" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="10"/>
    </filter>
  </defs>

  <!-- Background -->
  <g clip-path="url(#squircleClip3)">
    <rect x="0" y="0" width="512" height="512" fill="#FFFFFF"/>
    <rect x="0" y="0" width="512" height="512" fill="url(#purpleGlowLogo3)"/>
    <rect x="0" y="0" width="512" height="512" fill="url(#blueGlowLogo3)"/>
  </g>

  <!-- Liquid glass folder, centered, reduced size -->
  <g transform="translate(-97.6 -98.9) scale(1.3)">
    <g filter="url(#glassShadow)">
      <!-- Folder back (with tab) only -->
      <path d="M156 196
               a20 20 0 0 1 20 -20
               h60
               l24 26
               h108
               a20 20 0 0 1 20 20
               v128
               a20 20 0 0 1 -20 20
               h-192
               a20 20 0 0 1 -20 -20
               z"
            fill="url(#glassFill)" stroke="#FFFFFF" stroke-opacity="0.55" stroke-width="2.5"/>
    </g>

    <!-- Glossy highlight streak -->
    <ellipse cx="220" cy="220" rx="70" ry="18" fill="#FFFFFF" opacity="0.55" filter="url(#highlightBlur)" transform="rotate(-18 220 220)"/>
  </g>
</svg>
