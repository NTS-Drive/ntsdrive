  .remind-list-item:last-child{border-bottom:none;}
  .remind-list-item .emoji{font-size:20px; flex-shrink:0;}
  .remind-list-item .info{flex:1; min-width:0;}
  .remind-list-item .name{font-size:14px; font-weight:600; color:var(--ink);}
  .remind-list-item .date{font-size:12px; color:var(--sub); margin-top:2px;}
  .remind-list-item .del{font-size:12px; color:var(--sub); text-decoration:underline; cursor:pointer; flex-shrink:0; background:none; border:none;}
  .remind-empty{font-size:13px; color:var(--sub); text-align:center; padding:20px 0;}

<script>
function navigate(url){ document.body.classList.add('leaving'); setTimeout(()=>{ window.location.href = url; }, 260); }
function trackEvent(name, params) { try { if (typeof gtag === 'function') gtag('event', name, params || {}); } catch (e) {} }

function handleAdd() {
  const nameEl = document.getElementById('remindName');
  const dateEl = document.getElementById('remindDate');
  if (!dateEl.value) { alert('생일을 선택해주세요.'); return; }
  const mmdd = dateEl.value.slice(5); // "YYYY-MM-DD" -> "MM-DD"
  const result = NTSRemind.addRemind({ name: nameEl.value, date: mmdd });
  if (!result.ok) { alert(result.message); return; }
  nameEl.value = '';
  dateEl.value = '';
  renderList();
}

function handleDelete(id) {
  if (!confirm('정말 삭제하시겠어요?')) return;
  NTSRemind.removeRemind(id);
  renderList();
}

function escapeHtml(str) {
  return String(str).replace(/[&<>"']/g, m => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;' }[m]));
}

function renderList() {
  const list = NTSRemind.loadList().sort((a, b) => NTSRemind.daysUntil(a.date) - NTSRemind.daysUntil(b.date));
  const el = document.getElementById('remindListView');
  if (!list.length) {
    el.innerHTML = '<div class="remind-empty">아직 등록된 생일이 없어요.</div>';
    return;
  }
  el.innerHTML = list.map(r => {
    const d = NTSRemind.daysUntil(r.date);
    const dLabel = d === 0 ? 'D-DAY' : `D-${d}`;
    return `
      <div class="remind-list-item">
        <span class="emoji">🎂</span>
        <div class="info">
          <div class="name">${escapeHtml(r.name)}</div>
          <div class="date">${NTSRemind.formatDate(r.date)} · ${dLabel}</div>
        </div>
        <button class="del" onclick="handleDelete('${r.id}')">삭제</button>
      </div>`;
  }).join('');
}

renderList();
</script>
