  .settings-card{max-width:520px; background:var(--panel); border:1px solid var(--line); border-radius:16px; padding:24px; margin-bottom:20px;}
  .settings-card h2{font-family:'Space Grotesk'; font-size:16px; margin-bottom:8px;}

  .settings-btn{width:100%; padding:14px; border-radius:10px; border:none; background:var(--ink); color:#fff; font-size:14px; font-weight:600; cursor:pointer; margin-bottom:10px;}

  .remind-field{margin-bottom:14px;}
  .remind-field label{display:block; font-size:11px; letter-spacing:0.06em; text-transform:uppercase; color:var(--sub); margin-bottom:6px;}

  .remind-list-item{display:flex; align-items:center; gap:12px; padding:12px 0; border-bottom:1px solid var(--line);}
  .remind-list-item:last-child{border-bottom:none;}
  .remind-list-item .emoji{font-size:20px; flex-shrink:0;}
  .remind-list-item .info{flex:1; min-width:0;}
  .remind-list-item .name{font-size:14px; font-weight:600; color:var(--ink);}
  .remind-list-item .date{font-size:12px; color:var(--sub); margin-top:2px;}
  .remind-list-item .del{font-size:12px; color:var(--sub); text-decoration:underline; cursor:pointer; flex-shrink:0; background:none; border:none;}
  .remind-empty{font-size:13px; color:var(--sub); text-align:center; padding:20px 0;}
</style>

        <span onclick="navigate('../film/index.html')">Film</span>

    <div class="page-head">
      <h1>리마인드</h1>
      <p>친구·지인의 생일을 등록해두면, D-3부터 홈 화면에서 알려드려요.<br>이름과 생일 외엔 아무것도 저장하지 않고, 이 브라우저에만 남아요.</p>
    </div>

    <div class="settings-card">
      <h2>🎂 생일 등록하기</h2>
      <div class="remind-field">
        <label>이름</label>
        <input type="text" id="remindName" maxlength="20" placeholder="예: 은우">
      </div>
      <div class="remind-field">
        <label>생일 (월 · 일)</label>
        <div style="display:flex; gap:8px;">
          <select id="remindMonth" style="flex:1; border:1px solid var(--line); border-radius:8px; padding:11px 13px; font-size:14px; font-family:inherit; background:#fff;"></select>
          <select id="remindDay" style="flex:1; border:1px solid var(--line); border-radius:8px; padding:11px 13px; font-size:14px; font-family:inherit; background:#fff;"></select>
        </div>
      </div>
      <button class="settings-btn" onclick="handleAdd()">등록하기</button>
    </div>

      <h2>등록된 생일</h2>

<script>
function navigate(url){ document.body.classList.add('leaving'); setTimeout(()=>{ window.location.href = url; }, 260); }
function trackEvent(name, params) { try { if (typeof gtag === 'function') gtag('event', name, params || {}); } catch (e) {} }

const DAYS_IN_MONTH = [31, 29, 31, 30, 31, 30, 31, 31, 30, 31, 30, 31]; // 2월은 윤년도 고려해 29일까지 선택 가능하게

function populateDateSelects() {
  const monthEl = document.getElementById('remindMonth');
  const dayEl = document.getElementById('remindDay');
  monthEl.innerHTML = Array.from({ length: 12 }, (_, i) => `<option value="${i + 1}">${i + 1}월</option>`).join('');
  monthEl.addEventListener('change', () => populateDayOptions());
  populateDayOptions();
}
function populateDayOptions() {
  const monthEl = document.getElementById('remindMonth');
  const dayEl = document.getElementById('remindDay');
  const prevValue = dayEl.value;
  const maxDay = DAYS_IN_MONTH[Number(monthEl.value) - 1] || 31;
  dayEl.innerHTML = Array.from({ length: maxDay }, (_, i) => `<option value="${i + 1}">${i + 1}일</option>`).join('');
  if (prevValue && Number(prevValue) <= maxDay) dayEl.value = prevValue;
}

function handleAdd() {
  if (typeof window !== 'undefined' && window.NTSInAppBrowser) {
    alert(`${window.NTSInAppBrowser.name} 안에서는 등록이 저장되지 않아요. 주 사용 브라우저(사파리 또는 크롬)로 이동해서 다시 등록해주세요.`);
    trackEvent('remind_add_blocked_inapp', { app: window.NTSInAppBrowser.id });
    return;
  }
  const nameEl = document.getElementById('remindName');
  const mm = String(document.getElementById('remindMonth').value).padStart(2, '0');
  const dd = String(document.getElementById('remindDay').value).padStart(2, '0');
  const result = NTSRemind.addRemind({ name: nameEl.value, date: `${mm}-${dd}` });
  if (!result.ok) { alert(result.message); return; }
  nameEl.value = '';
  renderList();
}

function handleDelete(id) {
  if (!confirm('정말 삭제하시겠어요?')) return;
  NTSRemind.removeRemind(id);
  renderList();
}

function escapeHtml(str) {
  return String(str).replace(/[&<>"']/g, m => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;' }[m]));
}

function renderList() {
  const list = NTSRemind.loadList().sort((a, b) => NTSRemind.daysUntil(a.date) - NTSRemind.daysUntil(b.date));
  const el = document.getElementById('remindListView');
  if (!list.length) {
    el.innerHTML = '<div class="remind-empty">아직 등록된 생일이 없어요.</div>';
    return;
  }
  el.innerHTML = list.map(r => {
    const d = NTSRemind.daysUntil(r.date);
    const dLabel = d === 0 ? 'D-DAY' : `D-${d}`;
    return `
      <div class="remind-list-item">
        <span class="emoji">🎂</span>
        <div class="info">
          <div class="name">${escapeHtml(r.name)}</div>
          <div class="date">${NTSRemind.formatDate(r.date)} · ${dLabel}</div>
        </div>
        <button class="del" onclick="handleDelete('${r.id}')">삭제</button>
      </div>`;
  }).join('');
}

populateDateSelects();
renderList();
</script>
