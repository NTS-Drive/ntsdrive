<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>오피스 아케이드 &mdash; 미니게임 보관함</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans+KR:wght@400;600;700&family=IBM+Plex+Mono:wght@400;600&display=swap" rel="stylesheet">
<link href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.css" rel="stylesheet">
<link rel="stylesheet" href="styles.css">
</head>
<body>

<div class="explorer">

  <!-- 주소창 -->
  <div class="addressbar">
    <div class="breadcrumb">
      <span class="crumb root">오피스 아케이드</span>
      <span class="sep">›</span>
      <span class="crumb current">미니게임 보관함</span>
    </div>
    <div class="search-wrap">
      <input id="searchInput" type="text" placeholder="게임 이름, 오마주 대상으로 검색">
    </div>
  </div>

  <!-- 툴바 -->
  <div class="toolbar">
    <button class="tool-btn" id="sortBtn" title="등록일 기준 정렬 전환">
      <svg viewBox="0 0 20 20" width="15" height="15"><path d="M4 6h12M6 10h8M8 14h4" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" fill="none"/></svg>
      정렬: <span id="sortLabel">최신순</span>
    </button>
    <button class="tool-btn" id="refreshBtn" title="새로고침">
      <svg viewBox="0 0 20 20" width="15" height="15"><path d="M15 5a6 6 0 1 0 1.6 5.4M16 3v4h-4" stroke="currentColor" stroke-width="1.6" fill="none" stroke-linecap="round" stroke-linejoin="round"/></svg>
      새로고침
    </button>
    <div class="toolbar-spacer"></div>
    <div class="toolbar-note">개발 트랙: 미니게임 → SaaS → 세미나 → 굿즈</div>
  </div>

  <div class="explorer-body">

    <!-- 사이드바 -->
    <aside class="sidebar">
      <div class="side-section">
        <div class="side-title">빠른 실행</div>
        <button class="side-item active" data-filter="all">전체 게임</button>
        <button class="side-item" data-filter="new">신규 등록</button>
      </div>
      <div class="side-section">
        <div class="side-title">상태</div>
        <button class="side-item" data-filter="배포중"><span class="dot live"></span>배포중</button>
        <button class="side-item" data-filter="기획중"><span class="dot planning"></span>기획중</button>
      </div>
      <div class="side-section ad-side">
        <div class="side-title">광고 영역</div>
        <div class="ad-slot-vert">160×300<br>AdSense 승인 후 삽입</div>
      </div>
    </aside>

    <!-- 목록 -->
    <main class="listpane">
      <div class="list-head">
        <div class="col col-name">이름</div>
        <div class="col col-type">오마주 대상</div>
        <div class="col col-date">등록일</div>
        <div class="col col-status">상태</div>
        <div class="col col-action">실행</div>
      </div>
      <div id="fileList" class="file-list"></div>
      <div id="emptyState" class="empty-state" hidden>검색 결과가 없습니다.</div>
    </main>
  </div>

  <!-- 상태 표시줄 -->
  <div class="statusbar">
    <span id="statusCount">불러오는 중...</span>
    <span class="statusbar-note">본 목록의 모든 게임은 오리지널 디자인이며 특정 소프트웨어와 무관합니다.</span>
  </div>
</div>

<script>
let ALL_GAMES = [];
let currentFilter = 'all';
let sortDesc = true;
const ICON_COLORS = ['#2F5DA8', '#2F8F5B', '#8A5CB8', '#C9432B', '#3C8FA6'];

function iconColorFor(id) {
  let hash = 0;
  for (const ch of id) hash = (hash * 31 + ch.charCodeAt(0)) % 997;
  return ICON_COLORS[hash % ICON_COLORS.length];
}

function isNew(dateStr) {
  const days = (Date.now() - new Date(dateStr).getTime()) / 86400000;
  return days <= 14;
}

function render() {
  const listEl = document.getElementById('fileList');
  const emptyEl = document.getElementById('emptyState');
  const query = document.getElementById('searchInput').value.trim().toLowerCase();

  let games = ALL_GAMES.slice();

  if (currentFilter === 'new') games = games.filter(g => isNew(g.registeredAt));
  else if (currentFilter !== 'all') games = games.filter(g => g.status === currentFilter);

  if (query) {
    games = games.filter(g =>
      g.title.toLowerCase().includes(query) ||
      g.concept.toLowerCase().includes(query) ||
      g.homage.toLowerCase().includes(query)
    );
  }

  games.sort((a, b) => sortDesc
    ? new Date(b.registeredAt) - new Date(a.registeredAt)
    : new Date(a.registeredAt) - new Date(b.registeredAt));

  listEl.innerHTML = '';
  emptyEl.hidden = games.length > 0;

  games.forEach(game => {
    const row = document.createElement('div');
    row.className = 'file-row';
    const isLive = game.status === '배포중';
    const initial = game.title.trim().charAt(0);
    const btnHtml = game.entryPath
      ? `<a class="play-btn" href="${game.entryPath}">열기</a>`
      : `<span class="play-btn disabled">준비중</span>`;

    row.innerHTML = `
      <div class="col col-name">
        <span class="file-icon" style="background:${iconColorFor(game.id)}">${initial}</span>
        <div>
          <div class="file-title">${game.title}${isNew(game.registeredAt) ? '<span class="new-badge">NEW</span>' : ''}</div>
          <div class="file-concept">${game.concept}</div>
        </div>
      </div>
      <div class="col col-type">${game.homage}</div>
      <div class="col col-date">${game.registeredAt}</div>
      <div class="col col-status"><span class="dot ${isLive ? 'live' : 'planning'}"></span>${game.status}</div>
      <div class="col col-action">${btnHtml}</div>
    `;
    listEl.appendChild(row);
  });

  const liveCount = ALL_GAMES.filter(g => g.status === '배포중').length;
  const planCount = ALL_GAMES.filter(g => g.status === '기획중').length;
  document.getElementById('statusCount').textContent =
    `총 ${ALL_GAMES.length}개 항목 · 배포중 ${liveCount} · 기획중 ${planCount} · 표시 중 ${games.length}`;
}

async function init() {
  try {
    const res = await fetch('games.json', { cache: 'no-store' });
    ALL_GAMES = await res.json();
    render();
  } catch (e) {
    document.getElementById('statusCount').textContent = 'games.json을 불러올 수 없습니다.';
    document.getElementById('emptyState').hidden = false;
    document.getElementById('emptyState').textContent = '로컬에서 볼 때는 간이 서버(예: npx serve)로 실행해주세요.';
  }
}

document.querySelectorAll('.side-item').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.side-item').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    currentFilter = btn.dataset.filter;
    render();
  });
});

document.getElementById('searchInput').addEventListener('input', render);

document.getElementById('sortBtn').addEventListener('click', () => {
  sortDesc = !sortDesc;
  document.getElementById('sortLabel').textContent = sortDesc ? '최신순' : '오래된순';
  render();
});

document.getElementById('refreshBtn').addEventListener('click', init);

init();
</script>
</body>
</html>
